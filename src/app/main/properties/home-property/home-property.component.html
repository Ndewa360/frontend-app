<!-- Nouvelle interface intégrée avec onglets -->
<div class="property-management-container bg-carbon-layer-01 min-h-screen relative">

  <!-- Overlay de chargement global -->
  <app-loading-overlay
    [loadingState$]="globalLoadingState$"
    [showOverlay]="true"
    [showProgress]="true"
    customMessage="Chargement des données de l'application..."
    size="large">
  </app-loading-overlay>

  <!-- Header principal avec navigation par onglets -->
  <div class="main-header bg-carbon-layer-02 border-b border-carbon-subtle shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

      <!-- Titre et description -->
      <div class="header-content py-6">
        <div class="flex items-center justify-between">
          <div class="header-info">
            <h1 class="text-3xl font-bold text-carbon-primary mb-2">
              Gestion Immobilière
            </h1>
            <p class="text-carbon-secondary text-lg">
              Gérez vos propriétés et analysez vos performances financières
            </p>
          </div>

          <!-- Actions rapides --> 
          <div class="header-actions" *ngIf="currentView === 'properties'">
            <button
              class="custom-primary-button inline-flex items-center focus-carbon"
              (click)="onCreate()">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
              </svg>
              Nouvelle Propriété
            </button>
          </div>
        </div>
      </div>

      <!-- Navigation par onglets -->
      <div class="tab-navigation">
        <nav class="flex space-x-8" aria-label="Navigation principale">
          <button
            class="tab-button"
            [class.active]="currentView === 'properties'"
            (click)="switchView('properties')"
            type="button">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-4m-5 0H9m0 0H5m0 0h4M9 21v-4a2 2 0 012-2h2a2 2 0 012 2v4M9 21h6"></path>
            </svg>
            Mes Propriétés
            <span class="property-count" *ngIf="propertyCount > 0">({{ propertyCount }})</span>
          </button>

          <button
            class="tab-button"
            [class.active]="currentView === 'dashboard'"
            (click)="switchView('dashboard')"
            type="button">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
            </svg>
            Dashboard Financier
          </button>
        </nav>
      </div>
    </div>
  </div>

  <!-- Contenu principal -->
  <div class="main-content">
    <!-- Vue Liste des Propriétés -->
    <div
      class="view-container"
      [class.active]="currentView === 'properties'"
      [class.hidden]="currentView !== 'properties'">
      <app-list-property></app-list-property>
    </div>

    <!-- Vue Dashboard Financier -->
    <div
      class="view-container"
      [class.active]="currentView === 'dashboard'"
      [class.hidden]="currentView !== 'dashboard'">
      <app-modern-financial-dashboard></app-modern-financial-dashboard>
    </div>
  </div>

</div>
