<div class="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">

  <!-- Header moderne avec style Carbon -->
  <div class="bg-carbon-layer-01 border-b border-carbon-subtle">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between">

        <!-- Title Section -->
        <div class="flex-1">
          <div class="flex items-center space-x-3 mb-4">
            <div class="p-3 bg-carbon-blue-20 border border-carbon-blue-30">
              <svg class="w-8 h-8 text-carbon-blue-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-4m-5 0H9m0 0H5m0 0h4M9 21v-4a2 2 0 012-2h2a2 2 0 012 2v4M9 21h6">
                </path>
              </svg>
            </div>
            <div>
              <h1 class="text-3xl font-bold text-carbon-primary">Mes Propriétés</h1>
              <p class="text-lg text-carbon-secondary">
                Gérez votre portefeuille immobilier en toute simplicité
              </p>
            </div>
          </div>

          <!-- Métriques rapides avec style Carbon -->
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="text-center p-3 bg-carbon-green-10 border border-carbon-green-20">
              <div class="text-2xl font-bold text-carbon-green-70">{{ getTotalProperties() }}</div>
              <div class="text-sm text-carbon-green-60">Propriétés</div>
            </div>
            <div class="text-center p-3 bg-carbon-blue-10 border border-carbon-blue-20">
              <div class="text-2xl font-bold text-carbon-blue-70">{{ getTotalUnits() }}</div>
              <div class="text-sm text-carbon-blue-60">Unités</div>
            </div>
            <div class="text-center p-3 bg-carbon-purple-10 border border-carbon-purple-20">
              <div class="text-2xl font-bold text-carbon-purple-70">{{ getOccupancyRate() }}%</div>
              <div class="text-sm text-carbon-purple-60">Occupation</div>
            </div>
            <div class="text-center p-3 bg-carbon-yellow-10 border border-carbon-yellow-20">
              <div class="text-2xl font-bold text-carbon-yellow-70">{{ getTotalMonthlyRevenue() | currency:'XAF':'symbol':'1.0-0' }}</div>
              <div class="text-sm text-carbon-yellow-60">Revenus/mois</div>
            </div>
          </div>
        </div>

        <!-- Actions avec style Carbon -->
        <div class="mt-6 lg:mt-0 lg:ml-8 flex items-center space-x-4">
          <button
            class="btn-carbon-tertiary inline-flex items-center focus-carbon">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
              </path>
            </svg>
            Exporter
          </button>
          <button
            class="btn-carbon-primary inline-flex items-center focus-carbon"
            (click)="onAddProperty()">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6">
              </path>
            </svg>
            Nouvelle propriété
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Contenu principal -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div *ngIf="(initLoading$ | async) == 'LOADED'; else isLoadingTemp">
      <ng-container *ngIf="properties$ | async as properties">

        <!-- Barre de recherche et filtres avec style Carbon -->
        <div class="card-carbon-elevated p-6 mb-8">
          <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between space-y-4 lg:space-y-0">

            <!-- Recherche avec style Carbon -->
            <div class="flex-1 max-w-lg">
              <div class="relative">
                <input #searchInput type="text" placeholder="Rechercher une propriété..."
                  class="input-carbon pl-10 pr-4 py-3">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                  <svg class="w-5 h-5 text-carbon-icon-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                  </svg>
                </div>
              </div>
            </div>

            <!-- Statistiques et filtres avec style Carbon -->
            <div class="flex items-center space-x-6">
              <div class="text-center">
                <div class="text-2xl font-bold text-carbon-primary">{{ properties.length }}</div>
                <div class="text-sm text-carbon-secondary">Propriétés</div>
              </div>

              <select
                class="input-carbon px-4 py-2 text-sm focus-carbon">
                <option value="">Tous les statuts</option>
                <option value="available">Disponible</option>
                <option value="occupied">Occupé</option>
                <option value="maintenance">Maintenance</option>
              </select>
            </div>
          </div>
        </div>
        <!-- Nouvelle grille avec PropertyOverviewCard -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-4">
          <ng-container *ngFor="let property of properties; trackBy: trackByPropertyId">
            <app-property-overview-card [property]="property" [occupancyRate]="getPropertyOccupancyRate(property._id)"
              [monthlyRevenue]="getMonthlyRevenue(property._id)" [revenueGrowth]="getRevenueGrowth(property._id)"
              [overduePayments]="getOverduePayments(property._id)" [freeRooms]="getFreeRooms(property._id)"
              [totalRooms]="property.roomLength || 0" [occupiedRooms]="getOccupiedRooms(property._id)"
              [alerts]="getPropertyAlerts(property._id)" (addTenantClicked)="onAddTenant($event)"
              (recordPaymentClicked)="onRecordPayment($event)" (viewFinancesClicked)="onViewFinances($event)"
              (alertClicked)="onAlertClick($event)" (propertyViewed)="onViewPropertyDetails($event)"
              (propertyEdited)="onEditProperty($event)" (favoriteToggled)="onToggleFavorite($event)"
              (quickActionClicked)="onQuickAction($event)">
            </app-property-overview-card>
          </ng-container>
        </div>
      </ng-container>
      <ng-container *ngIf="(properties$ | async).length == 0">
        <app-no-data-list textDescription="bien" class="flex-auto"></app-no-data-list>
      </ng-container>
    </div>
    <ng-template #isLoadingTemp>
      <div class="flex items-center justify-center py-16">
        <youpez-loader></youpez-loader>
      </div>
    </ng-template>
  </div>
</div>
