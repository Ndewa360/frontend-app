<youpez-sidenav-container #panelLocation panel="panel">
    <youpez-sidenav
          [breakpoint]="'lg'"
          [direction]="'right'"
          [opened]="isAssignedOpened"
          (visibleChange)="isAssignedOpened=$event"
          [mode]="'over'"
          [toggleableBtn]="true"
          (close)="onClose($event)"
          [size]="'lg'">
        <assign-location [sideNavBarElement]="panelLocation" [isAssignedOpened]="isAssignedOpened" [property]="property"></assign-location>
    </youpez-sidenav>

    <ibm-table-container class="">
        <ng-template #locataireTemplate let-data="data">
            <ng-container *ngIf="(getLocataireById(data) | async ) as locataireData">
                {{locataireData["fullName"]}}
            </ng-container>
        </ng-template>

        <ng-template #dateEntryTemplate let-data="data">
            {{data | date:'mediumDate'}}
        </ng-template>

        <ng-template #roomTemplate let-data="data">
            <ng-container *ngIf="( getRoomById(data) | async )as roomData">
                <ng-container [ngSwitch]="roomData.type">
                    <span *ngSwitchCase="'room'">Chambre {{roomData["code"]}}</span>
                    <span *ngSwitchCase="'studio'">Studio #{{roomData["code"]}}</span>
                    <span *ngSwitchCase="'simple_apartment'">Apartement #{{roomData["code"]}}</span>
                    <span *ngSwitchCase="'furnished_apartment'">Apartement Meublé #{{roomData["code"]}}</span>
                </ng-container>
            </ng-container>
        </ng-template>

        <ng-template #actionTemplate let-data="data" >
            <div class="flex">
                <div class="app-mini-sidebar__list__item__pill mr-2" [routerLink]="'/app/locataires/'+data.location.locataire" container="body" ngbTooltip="Voir les details du locataire">
                    <youpez-ibm-icon class="location-icon text-bleu cursor-pointer " iconName="view" iconSize="20"></youpez-ibm-icon>  
                </div>
                <div class="app-mini-sidebar__list__item__pill mr-2"  (click)="removeAssignLocationRoom(data.location)"  container="body" ngbTooltip="Mettre fin à la location">
                    <!-- <youpez-ibm-icon class="location-icon text-bleu cursor-pointer " iconName="view" iconSize="20"></youpez-ibm-icon>   -->
                    <mat-icon svgIcon="person_remove_alt_1" class="text-red"></mat-icon>
                </div>
                <div class="app-mini-sidebar__list__item__pill" (click)="addLocationPayment(data.location)" container="body" ngbTooltip="Ajouter un paiement">
                    <youpez-ibm-icon class="location-icon text-green cursor-pointer " iconName="money" iconSize="20"></youpez-ibm-icon>  
                </div>
            </div>
        </ng-template>
    
        <ng-container *ngIf="(loadingData$ | async )=='LOADED' else isLoading">
            <ng-container *ngIf="hasNoData else hasData">
              <app-no-data-list textDescription="contract de location" class="flex-auto"></app-no-data-list>                              
            </ng-container>
            <ng-template #hasData>
                <ibm-table
                    [model]="model"
                    [size]="size"
                    [skeleton]="skeleton"
                    [showSelectionColumn]="showSelectionColumn"
                    [enableSingleSelect]="enableSingleSelect"
                    (rowClick)="onRowClick($event)"
                    [sortable]="sortable"
                    [stickyHeader]="stickyHeader"
                    [striped]="striped"
                    [isDataGrid]="isDataGrid"
                    (sort)="simpleSort($event)">
                    <ng-content></ng-content>
                </ibm-table>
            </ng-template>  
        </ng-container>
        <ng-template #isLoading>
          <div class="relative">
            <youpez-loader></youpez-loader>
          </div>
        </ng-template>
    
    
        <ng-template #customTrigger>
            <svg ibmIconSettings size="16"></svg>
        </ng-template>
    </ibm-table-container>
</youpez-sidenav-container>
