
         <div fxFill fxLayout="column">
            <div class="px-20 py-20 text-center mb-2 app-border-b">
              <youpez-ibm-icon iconName="task" iconSize="32"></youpez-ibm-icon>
            </div>
            <div class="app-expressive-heading-02 px-4 truncate mb-2">Assigner un chambre</div>
            <div fxFlex class="relative">
              <div class="app-a-box app-scrollbar-fix">
                <ng-scrollbar>
                    <form [formGroup]="formGroup" (ngSubmit)="onSubmit()">
                        <div class="px-4 py-3">
                            <div class="app-form">
                                <div fxLayout="row wrap" class="app-form__row">
                                    <div fxFlex="100%"  class="app-form__item">
                                        <ibm-label  [invalid]="isValid('roomId')" [invalidText]="'Vous devez choisir une chambre'">
                                        Choisissez la chambre 
                                            <ibm-combo-box class="mt-2"
                                            [items]="roomList"
                                            formControlName="roomId"
                                            theme="dark"
                                            size="md">
                                            <ibm-dropdown-list></ibm-dropdown-list>
                                        </ibm-combo-box>   
                                        </ibm-label>
                                    </div>

                                    <div fxFlex="100%"  class="app-form__item">
                                        <ibm-label [invalid]="isValid('locataireId')" [invalidText]="'Vous devez choisir un locataire libre'">
                                        Choisissez le locataire 
                                            <ibm-combo-box class="mt-2"
                                            [items]="locataireList"
                                            formControlName="locataireId"
                                            theme="dark"
                                            size="md">
                                            <ibm-dropdown-list></ibm-dropdown-list>
                                        </ibm-combo-box>   
                                        </ibm-label>
                                    </div>
                                    <div class="mb-6">
                                        <ibm-date-picker
                                        formControlName="startedDate"
                                          [label]="'Date d\'entrée du locataire'"
                                          [placeholder]="'dd/mm/yyyy'"
                                          [language]="'fr'"
                                          [size]="'md'"
                                          [theme]="'dark'"
                                          [disabled]="false"
                                          [invalid]="false"
                                          [invalidText]="''"
                                          [dateFormat]="'d/m/Y'">
                                        </ibm-date-picker>
                                    </div>

                                    <div class="sm:col-span-3 mb-6">
                                        <youpez-alert
                                            [appearance]="'outline'"
                                            [type]="'info'">
                                            Vous pouvez sélectionner un template afin de rédiger le message sous la forme proposé par le template. Dans ce cas, le contenu du message n'est plus obligatoire!
                                        </youpez-alert>
                                    </div>

                                </div>
                            </div>
                            
                            
                        </div>
                    </form>
                </ng-scrollbar>
              </div>
            </div>
            <div class="px-4 py-4">
              <div class="mb-1">
                <button ibmButton="primary" size="sm" class="w-full mb-1">
                  Download
                    <youpez-ibm-icon iconClass="bx--btn__icon" iconName="download" iconSize="20"></youpez-ibm-icon>
                </button>
              </div>
              <div class="mb-1">
                <button ibmButton="primary" size="sm" class="w-full mb-1">
                  Share
                  <youpez-ibm-icon iconClass="bx--btn__icon" iconName="share" iconSize="20"></youpez-ibm-icon>

                </button>
              </div>
              <div class="mb-1">
                <button ibmButton="danger" size="sm" class="w-full">
                  Delete
                  <youpez-ibm-icon iconClass="bx--btn__icon" iconName="trashCan" iconSize="20"></youpez-ibm-icon>

                </button>
              </div>
            </div>
          </div>
