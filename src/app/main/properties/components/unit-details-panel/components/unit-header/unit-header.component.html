<!-- Header du panneau -->
<div class="flex-shrink-0 px-6 py-5 border-b border-gray-200 bg-gradient-to-r from-gray-50 to-gray-100">
  <div class="flex items-start justify-between">
    <div class="flex-1">
      <div class="flex items-center mb-3">
        <div class="p-2 bg-blue-100 rounded-lg mr-3">
          <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
          </svg>
        </div>
        <div>
          <h2 class="text-xl font-bold text-gray-900">{{ getRoomName() }}</h2>
          <p class="text-sm text-gray-600">{{ getRoomType() }}</p>
        </div>
      </div>
      
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <div class="text-center">
            <div class="text-2xl font-bold" style="color: rgb(204, 140, 10);">
              {{ formatPrice(unitData?.room?.price || 0) }}
            </div>
            <div class="text-xs text-gray-500">{{ 'PROPERTY_DETAILS.UNIT_CARD.PER_MONTH' | translate }}</div>
          </div>
          
          <div class="h-8 w-px bg-gray-300"></div>
          
          <div>
            <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium"
                  [class.bg-green-100]="getRoomStatus() === 'Disponible'"
                  [class.text-green-800]="getRoomStatus() === 'Disponible'"
                  [class.bg-red-100]="getRoomStatus() === 'Occupée'"
                  [class.text-red-800]="getRoomStatus() === 'Occupée'"
                  [class.bg-yellow-100]="getRoomStatus() === 'En maintenance'"
                  [class.text-yellow-800]="getRoomStatus() === 'En maintenance'">
              <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
                <circle cx="10" cy="10" r="3"></circle>
              </svg>
              {{ getRoomStatus() }}
            </span>
          </div>
        </div>
      </div>
    </div>
    
    <button (click)="onClose()" 
            class="p-2 rounded-lg hover:bg-gray-200 transition-colors duration-200 ml-4">
      <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>
</div>
