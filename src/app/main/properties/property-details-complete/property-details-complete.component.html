<!-- Page de détails de propriété refactorisée -->
<div class="property-management-container">

  <!-- Header principal - Style identique à la page de liste -->
  <div class="main-header">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

      <div class="header-content py-4">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between">

          <!-- Informations de l'en-tête -->
          <div class="header-info mb-3 lg:mb-0">
            <!-- Navigation redesignée -->
            <div class="flex items-center space-x-3 mb-3">
              <button (click)="goBack()"
                      class="inline-flex items-center px-4 py-2 bg-white border-2 border-gray-200 rounded-lg text-gray-700 hover:bg-gray-50 hover:border-gray-300 transition-all duration-300 shadow-sm hover:shadow-md">
                <youpez-ibm-icon iconName="arrowLeft" iconSize="16" class="mr-2 text-gray-500"></youpez-ibm-icon>
                <span class="font-medium">Retour aux propriétés</span>
              </button>
              <div class="flex items-center text-sm text-gray-500">
                <span>Propriétés</span>
                <youpez-ibm-icon iconName="chevronRight" iconSize="16" class="mx-2"></youpez-ibm-icon>
                <span class="text-gray-700 font-medium">Détails</span>
              </div>
            </div>

            <ng-container *ngIf="property$ | async as property; else loadingHeader">
              <h1 class="text-2xl font-bold mb-1">
                {{ property.name }}
              </h1>
              <p class="text-gray-600 flex items-center text-sm">
                <youpez-ibm-icon iconName="location" iconSize="16" class="mr-2 text-gray-400"></youpez-ibm-icon>
                {{ property.location ?? 'Adresse non spécifiée' }}
              </p>
            </ng-container>

            <ng-template #loadingHeader>
              <div class="animate-pulse">
                <div class="h-6 bg-gray-200 rounded w-64 mb-1"></div>
                <div class="h-4 bg-gray-200 rounded w-48"></div>
              </div>
            </ng-template>
          </div>

          <!-- Actions de l'en-tête -->
          <div class="header-actions flex items-center space-x-3">
            <button ibmButton="primary"
                    size="md"
                    class="custom-primary-button inline-flex items-center focus-carbon"
                    (click)="onEditProperty()">
              <youpez-ibm-icon iconName="edit" iconSize="16" class="mr-2"></youpez-ibm-icon>
              Modifier
            </button>
          </div>
        </div>
      </div>


    </div>
  </div>

  <!-- Navigation par onglets -->
  <div class="tabs-navigation bg-gray-100 border-b border-gray-200 flex-shrink-0">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <nav class="flex space-x-0" aria-label="Tabs">
        <button *ngFor="let tab of tabs; trackBy: trackByTabId"
                (click)="setActiveTab(tab.id)"
                class="property-tab-button px-6 py-4 text-sm font-medium border-b-2 border-transparent transition-all duration-300 ease-in-out"
                [ngClass]="{
                  'active': activeTab === tab.id
                }">
          <div class="flex items-center">
            <youpez-ibm-icon [iconName]="getTabIcon(tab.icon)"
                             iconSize="16"
                             class="mr-2"></youpez-ibm-icon>
            {{ tab.label }}
            <span *ngIf="tab.count !== undefined"
                  class="ml-2 bg-gray-100 text-gray-900 py-1 px-2 rounded-full text-xs font-medium tab-count">
              {{ tab.count }}
            </span>
          </div>
        </button>
      </nav>
    </div>
  </div>

  <!-- Contenu des onglets avec scroll -->
  <div class="tab-content flex-1 overflow-y-auto bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      
      <!-- Onglet Vue d'ensemble -->
      <div *ngIf="activeTab === 'overview'" class="tab-panel">
        <app-property-overview
          [property]="property$ | async"
          [units]="units$ | async"
          [tenants]="tenants$ | async"
          [history]="history$ | async"
          [loading]="(loadingStates$ | async)?.property || false"
          (quickAction)="onQuickAction($event)"> 
        </app-property-overview>
      </div>

      <!-- Onglet Unités locatives -->
      <div *ngIf="activeTab === 'units'" class="tab-panel">
        <app-property-units-list
          [propertyId]="propertyId"
          (unitAction)="onUnitAction($event)"
          (addUnit)="onAddUnit()">
        </app-property-units-list>
      </div>

      <!-- Onglet Locataires -->
      <div *ngIf="activeTab === 'tenants'" class="tab-panel">
        <app-property-tenants
          [tenants]="(tenants$ | async) ?? []"
          [units]="(units$ | async) ?? []"
          [loading]="(loadingStates$ | async)?.tenants ?? false"
          [propertyId]="propertyId">
        </app-property-tenants>
      </div>

      <!-- Onglet Historique -->
      <div *ngIf="activeTab === 'history'" class="tab-panel">
        <app-property-history
          [history]="(history$ | async) ?? []"
          [loading]="(loadingStates$ | async)?.property ?? false"
          [propertyId]="propertyId">
        </app-property-history>
      </div>

      <!-- Onglet Finances -->
      <div *ngIf="activeTab === 'finances'" class="tab-panel">
        <app-property-finances
          [propertyId]="propertyId">
        </app-property-finances>
      </div>

      <!-- État de chargement global -->
      <div *ngIf="(loadingStates$ | async)?.property && !(property$ | async)"
           class="loading-state">
        <div class="flex items-center justify-center py-12">
          <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600 mx-auto mb-4"></div>
            <p class="text-gray-600">Chargement des données de la propriété...</p>
          </div>
        </div>
      </div>

      <!-- État d'erreur -->
      <div *ngIf="!((loadingStates$ | async)?.property) && !(property$ | async)"
           class="error-state">
        <div class="text-center py-12">
          <youpez-ibm-icon iconName="warning" iconSize="32" class="text-red-500 mx-auto mb-4"></youpez-ibm-icon>
          <h3 class="text-lg font-medium text-gray-900 mb-2">Propriété introuvable</h3>
          <p class="text-gray-600 mb-6">
            La propriété demandée n'existe pas ou vous n'avez pas les permissions pour la voir.
          </p>
          <button ibmButton="primary"
                  (click)="goBack()"
                  class="custom-primary-button">
            Retour aux propriétés
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Actions flottantes (optionnel) -->
<div class="floating-actions fixed bottom-6 right-6 z-50">
  <div class="flex flex-col space-y-3">
    <!-- Bouton d'actualisation -->
    <button ibmButton="ghost" 
            size="lg"
            (click)="refreshData()"
            class="rounded-full shadow-lg bg-white border border-gray-200 hover:shadow-xl transition-shadow">
      <youpez-ibm-icon iconName="refresh" iconSize="20"></youpez-ibm-icon>
    </button>
    
    <!-- Bouton d'export -->
    <button ibmButton="secondary" 
            size="lg"
            (click)="exportData('pdf')"
            class="rounded-full shadow-lg hover:shadow-xl transition-shadow">
      <youpez-ibm-icon iconName="download" iconSize="20"></youpez-ibm-icon>
    </button>
  </div>
</div>
