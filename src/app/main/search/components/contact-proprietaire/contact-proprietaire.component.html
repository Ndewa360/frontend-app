<ng-template #invalidText>
    <img src="assets/img/avatar/avatar3.jpg" class="app-img-select__item w-8 rounded" />
</ng-template>

<div fxFill fxLayout="column" class="app-bg-container overflow-hidden">
    <div fxFlex>
        <div class="">

            <div class="bg-gray-200  dark:bg-gray-800   flex flex-wrap items-center  justify-center  ">
                <div class="container bg-white  shadow-lg transform duration-200 easy-in-out">
                    <div class=" h-32 overflow-hidden" >
                        <img class="w-full" src="https://images.unsplash.com/photo-1605379399642-870262d3d051?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=2000&q=80" alt="" />
                    </div>
                    <div class="flex justify-center px-5  -mt-12">
                        <img class="h-32 w-32 bg-white p-2 rounded-full" src="assets/img/avatar/avatarinit.png" alt="" />    
                    </div>
                    <div class=" ">
                        <div class="text-center px-14">
                            <h2 class="text-gray-800 text-3xl font-bold">{{data.room.property.owner.name}}</h2>
                        </div>
                        <!-- <hr class="mt-6" /> -->
                        <div class="flex  bg-gray-50 justify-evenly  ">
                            <div class="flex flex-col">
                                <div class="text-center p-4 hover:bg-gray-100 cursor-pointer">
                                    <i class="fa fa-envelope text-muted me-1 mr-3 spec-home"></i>
                                    <span class="font-normal">{{data.room.property.owner.email}}</span>
                                </div>
                                <div class="p-4 hover:bg-gray-100 cursor-pointer">
                                    <i class="fa fa-globe text-muted me-1 mr-3 spec-home"></i>
                                    <span class="font-normal">{{data.room.property.geolocationCountry.fullName}}</span>
                                </div>
                            </div>
                            <!-- <i class="fa-solid fa-globe"></i> -->
                            <!-- <div class="text-center w-1/2 p-4 hover:bg-gray-100 cursor-pointer">
                                <p> <span class="font-semibold">2.0 k </span> Following</p>
                            </div> -->
                            <div class="flex flex-col">
                                <div class="text-center p-4 hover:bg-gray-100 cursor-pointer">
                                    <i class="fa fa-phone text-muted me-1 mr-3 spec-home"></i>
                                    <span class="font-normal">{{data.room.property.owner.phoneNumber}}</span>
                                </div>                                
                                <div class="text-center p-4 hover:bg-gray-100 cursor-pointer">
                                    <i class="fa fa-location-dot text-muted me-1 mr-3 spec-home"></i>
                                    <span class="font-normal">{{data.room.property.geolocationCity.fullName}}</span>
                                </div>
                            </div>
    
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
<div class="px-4 py-4 flex justify-end app-border-t">

    <button ibmButton="primary" (click)="onClose()" size="md" class="custom-primary-button">
        <span class="btn-text">Ok</span>
        <!-- <youpez-ibm-icon iconClass="cds--btn__icon" iconName="add" iconSize="20"></youpez-ibm-icon> -->
    </button>
</div>
