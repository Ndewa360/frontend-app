<!-- Filtres de recherche modernes intégrés -->
<div class="advanced-search-filters">

  <!-- Header des filtres -->
  <div class="filters-header">
    <div class="filters-header-content">
      <div class="filters-title-section">
        <i class="fas fa-filter filters-icon"></i>
        <h3 class="filters-title">Filtres de recherche</h3>
      </div>
      <button (click)="resetFilters()" class="filters-reset-btn">
        Réinitialiser tout
      </button>
    </div>
  </div>

  <!-- Localisation -->
  <div class="filter-section">
    <h4 class="filter-section-title">
      <i class="fas fa-map-marker-alt filter-section-icon"></i>
      Localisation
    </h4>
    <div class="filter-section-content">
      <div class="form-group">
        <label class="form-label">Ville</label>
        <select [(ngModel)]="filters.city"
                (ngModelChange)="onLocationChange()"
                class="form-select">
          <option value="">Toutes les villes</option>
          <option value="douala">Douala</option>
          <option value="yaounde">Yaoundé</option>
          <option value="bafoussam">Bafoussam</option>
          <option value="bamenda">Bamenda</option>
          <option value="limbe">Limbé</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Quartier</label>
        <select [(ngModel)]="filters.district" class="form-select">
          <option value="">Tous les quartiers</option>
          <option *ngFor="let district of getDistrictsByCity(filters.city)" [value]="district.value">
            {{ district.label }}
          </option>
        </select>
      </div>
    </div>
  </div>

  <!-- Budget -->
  <div class="filter-section">
    <h4 class="filter-section-title">
      <i class="fas fa-coins filter-section-icon"></i>
      Budget mensuel (FCFA)
    </h4>
    <div class="filter-section-content">
      <!-- Slider de prix -->
      <div class="price-slider-container">
        <div class="price-range-labels">
          <span class="price-label">{{ formatPrice(priceRange.min) }}</span>
          <span class="price-label">{{ formatPrice(priceRange.max) }}</span>
        </div>
        <div class="price-slider">
          <div class="price-track">
            <div class="price-progress"
                 [style.left.%]="getPricePercentage(filters.priceMin)"
                 [style.width.%]="getPricePercentage(filters.priceMax) - getPricePercentage(filters.priceMin)">
            </div>
          </div>
          <input type="range"
                 [min]="priceRange.min"
                 [max]="priceRange.max"
                 [step]="10000"
                 [(ngModel)]="filters.priceMin"
                 (ngModelChange)="onPriceChange()"
                 class="price-input">
          <input type="range"
                 [min]="priceRange.min"
                 [max]="priceRange.max"
                 [step]="10000"
                 [(ngModel)]="filters.priceMax"
                 (ngModelChange)="onPriceChange()"
                 class="price-input">
        </div>
      </div>

      <!-- Inputs de prix -->
      <div class="price-inputs-grid">
        <div class="form-group">
          <label class="form-label">Minimum</label>
          <div class="price-input-wrapper">
            <input type="number"
                   [(ngModel)]="filters.priceMin"
                   (ngModelChange)="onPriceChange()"
                   placeholder="0"
                   class="form-input price-number-input">
            <span class="price-currency">FCFA</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Maximum</label>
          <div class="price-input-wrapper">
            <input type="number"
                   [(ngModel)]="filters.priceMax"
                   (ngModelChange)="onPriceChange()"
                   placeholder="∞"
                   class="form-input price-number-input">
            <span class="price-currency">FCFA</span>
          </div>
        </div>
      </div>

      <!-- Suggestions de prix -->
      <div class="price-suggestions">
        <button *ngFor="let suggestion of priceSuggestions"
                (click)="setPriceSuggestion(suggestion)"
                class="price-suggestion-btn">
          {{ suggestion.label }}
        </button>
      </div>
    </div>
  </div>

  <!-- Type de logement -->
  <div class="filter-section">
    <h4 class="filter-section-title">
      <i class="fas fa-home filter-section-icon"></i>
      Type de logement
    </h4>
    <div class="filter-section-content">
      <div class="property-types-grid">
        <button *ngFor="let type of propertyTypes"
                [class.active]="filters.propertyType === type.value"
                (click)="setPropertyType(type.value)"
                class="property-type-btn">
          <i [class]="type.iconClass"></i>
          <span>{{ type.label }}</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Nombre de chambres -->
  <div class="filter-section">
    <h4 class="filter-section-title">
      <i class="fas fa-bed filter-section-icon"></i>
      Nombre de chambres
    </h4>
    <div class="filter-section-content">
      <div class="room-numbers-grid">
        <button *ngFor="let num of roomNumbers"
                [class.active]="filters.rooms === num"
                (click)="setRoomFilter(num)"
                class="room-number-btn">
          {{ num }}{{ num === 5 ? '+' : '' }}
        </button>
      </div>
    </div>
  </div>

  <!-- Équipements -->
  <div class="filter-section">
    <h4 class="filter-section-title">
      <i class="fas fa-check-circle filter-section-icon"></i>
      Équipements
    </h4>
    <div class="filter-section-content">
      <div class="amenities-list">
        <label *ngFor="let amenity of amenitiesList" class="amenity-checkbox">
          <input type="checkbox"
                 [checked]="filters.amenities?.includes(amenity.value)"
                 (change)="toggleAmenity(amenity.value)"
                 class="amenity-input">
          <div class="amenity-content">
            <i [class]="amenity.iconClass" class="amenity-icon"></i>
            <span class="amenity-label">{{ amenity.label }}</span>
          </div>
        </label>
      </div>
    </div>
  </div>

  <!-- Préférences -->
  <div class="filter-section">
    <h4 class="filter-section-title">
      <i class="fas fa-heart filter-section-icon"></i>
      Préférences
    </h4>
    <div class="filter-section-content">
      <div class="preferences-list">
        <label *ngFor="let preference of preferencesList" class="preference-checkbox">
          <input type="checkbox"
                 [checked]="filters.preferences?.includes(preference.value)"
                 (change)="togglePreference(preference.value)"
                 class="preference-input">
          <div class="preference-content">
            <i [class]="preference.iconClass" class="preference-icon"></i>
            <span class="preference-label">{{ preference.label }}</span>
          </div>
        </label>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="filter-actions">
    <div class="actions-buttons">
      <button (click)="applyFilters()" class="search-btn">
        <i class="fas fa-search"></i>
        Rechercher
      </button>
      <button (click)="saveSearch()" *ngIf="canSaveSearch" class="save-btn">
        <i class="fas fa-bookmark"></i>
      </button>
    </div>
  </div>

  <!-- Résultats en temps réel -->
  <div class="results-preview">
    <div class="results-preview-content">
      <span class="results-count">{{ resultCount }} logements trouvés</span>
      <button class="view-results-btn">
        Voir les résultats
      </button>
    </div>
  </div>

</div>
