<!-- Wrapper moderne pour les résultats de recherche -->
<div class="search-results-wrapper">
  <!-- En-tête des résultats -->
  <div class="results-header" *ngIf="showHeader">
    <div class="results-info">
      <h3 class="results-title">{{ (properties | async)?.length || 0 }} logements trouvés</h3>
      <p class="results-subtitle" *ngIf="searchQuery">
        Résultats pour "{{ searchQuery }}"
      </p>
    </div>
    
    <div class="results-actions">
      <button class="action-btn" (click)="onToggleView()" *ngIf="allowViewToggle">
        <youpez-ibm-icon [iconName]="viewMode === 'grid' ? 'list' : 'grid'" iconSize="16"></youpez-ibm-icon>
        {{ viewMode === 'grid' ? 'Vue liste' : 'Vue grille' }}
      </button>
    </div>
  </div>

  <!-- Contenu des résultats -->
  <div class="results-content" [ngClass]="'view-' + viewMode">
    <!-- Utilisation du composant existant -->
    <room-filtered-found></room-filtered-found>
  </div>

  <!-- État vide -->
  <div class="empty-state" *ngIf="(properties | async)?.length === 0 && !loading">
    <div class="empty-content">
      <div class="empty-icon">
        <youpez-ibm-icon iconName="search" iconSize="32"></youpez-ibm-icon>
      </div>
      <h3 class="empty-title">Aucun logement trouvé</h3>
      <p class="empty-message">
        Essayez de modifier vos critères de recherche ou explorez d'autres zones.
      </p>
      <div class="empty-actions">
        <button class="reset-btn" (click)="onResetFilters()">
          <youpez-ibm-icon iconName="reset" iconSize="16"></youpez-ibm-icon>
          Réinitialiser les filtres
        </button>
        <button class="browse-btn" (click)="onBrowseAll()">
          <youpez-ibm-icon iconName="explore" iconSize="16"></youpez-ibm-icon>
          Parcourir tous les logements
        </button>
      </div>
    </div>
  </div>

  <!-- État de chargement -->
  <div class="loading-state" *ngIf="loading">
    <div class="loading-content">
      <div class="loading-spinner">
        <youpez-loader></youpez-loader>
      </div>
      <p class="loading-text">Recherche en cours...</p>
    </div>
  </div>
</div>
