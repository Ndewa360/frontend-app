<!-- <ng-scrollbar> -->
    <div fxFill fxLayout="column">
        <div fxFlex class="relative">
          <div class="app-subtitle app-subtitle--cards mt-2"></div>
          <div fxLayout="row wrap" class="app-card-row-holder app-card-row-room-container mb-2">
           
              <ng-container>
 
                  <ng-container *ngFor="let room of relatedFoundRooms">
                    <div fxFlex="100%" fxFlex.gt-md="25%" (click)="goToRoom($event,room)" >
                      <div class="app-card app-card--select app-card-room  room-associated">
                        <!-- <button (click)="openShowRoom(room)"
                          class="float-right btn-text-edit top-2 mt-4 mr-4 bg-slate-700 rounded-md">
                          <youpez-ibm-icon iconName="pen" iconSize="24"></youpez-ibm-icon>
                        </button> -->
                        <div class="app-card__content__alt">
                          <div class="">
                            <div class="text-center app-bg-decorative mb-2" [ngClass]="{'border-color': room.isFree?'rgb(220, 38, 38)':'rgb(22, 163, 74)'}">
                              <!-- <youpez-ibm-icon iconName="home" iconSize="32" ></youpez-ibm-icon> -->
                              <!-- <img src="assets/img/utils/room.png" alt="" width="100" srcset=""> -->
                              <slider-component-galery [images]="room.medias"></slider-component-galery>
                              
                            </div>
                            <div>
                              <div class="grid grid-cols-10 mt-2 mb-2 ">
                                <div class=" app-expressive-heading-02 col-span-7 text-muted">
                                    <span >{{getRoomType(room.type)}}</span>
                                  <!-- <span class="location-zone ml-1">{{property.location}}</span> -->
                                </div>
                                <div class="app-expressive-heading-01 col-span-3 col-end-auto text-right  text-muted ">
                                  <span class="mr-1">{{room.price | currency : getMoney(): 'symbol' : '1.0-0'}}</span>
                                </div>
                              </div>
      
                              <div class="grid grid-cols-10 mt-4 mb-2 ">
                                <div class="app-label-01 app-expressive-heading-02 col-span-4 text-muted">
                                    <span >
                                      <i class="fa fa-bed  text-muted me-1 mr-1 spec-home"></i>
                                        {{room.specifity.numberOfBathroom}}
                                    </span>
                                    <span *ngIf="room.specifity.hasKitchen" class="ml-2">
                                      <svg class="text-muted me-1 mr-1" xmlns="http://www.w3.org/2000/svg" height="16" width="18" viewBox="0 0 576 512"><path opacity="1" fill="currentColor" d="M240 144A96 96 0 1 0 48 144a96 96 0 1 0 192 0zm44.4 32C269.9 240.1 212.5 288 144 288C64.5 288 0 223.5 0 144S64.5 0 144 0c68.5 0 125.9 47.9 140.4 112h71.8c8.8-9.8 21.6-16 35.8-16H496c26.5 0 48 21.5 48 48s-21.5 48-48 48H392c-14.2 0-27-6.2-35.8-16H284.4zM144 80a64 64 0 1 1 0 128 64 64 0 1 1 0-128zM400 240c13.3 0 24 10.7 24 24v8h96c13.3 0 24 10.7 24 24s-10.7 24-24 24H280c-13.3 0-24-10.7-24-24s10.7-24 24-24h96v-8c0-13.3 10.7-24 24-24zM288 464V352H512V464c0 26.5-21.5 48-48 48H336c-26.5 0-48-21.5-48-48zM48 320h80 16 32c26.5 0 48 21.5 48 48s-21.5 48-48 48H160c0 17.7-14.3 32-32 32H64c-17.7 0-32-14.3-32-32V336c0-8.8 7.2-16 16-16zm128 64c8.8 0 16-7.2 16-16s-7.2-16-16-16H160v32h16zM24 464H200c13.3 0 24 10.7 24 24s-10.7 24-24 24H24c-13.3 0-24-10.7-24-24s10.7-24 24-24z"></path></svg>                                
                                    </span>
                                    <span class="ml-2">
                                      <i class="fa fa-bath text-muted me-1 mr-1 spec-home"></i>
                                      {{room.specifity.numberOfShower}}
                                    </span> 
                                </div>
      
                                <div class=" text-muted items-center  col-span-6 col-end-auto text-right">
                                
                                  <youpez-ibm-icon iconName="location" iconSize="16"></youpez-ibm-icon>
        
                                  <span class="location-zone ml-1">{{room.property.location}}</span>
        
                                </div>
                              </div>                        
      
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </ng-container>
                     
              </ng-container>
      
          </div>
        </div>
      </div>
