<!-- Page de recherche professionnelle -->
<div class="search-page">
  <!-- Header épuré -->
  <div class="search-header">
    <div class="container">
      <div class="search-header-content">
        <div class="search-title-area">
          <h1 class="page-title">Unités locatives disponibles</h1>
          <p class="page-subtitle">Trouvez l'unité parfaite parmi {{ (searchResults$ | async)?.length || 0 }} logements disponibles</p>
        </div>

        <!-- Barre de recherche principale -->
        <div class="main-search-bar">
          <div class="search-input-group">
            <i class="search-icon fas fa-search"></i>
            <input
              #searchInput
              type="text"
              placeholder="Rechercher par ville, quartier ou type de logement..."
              class="search-input"
              (input)="onMainSearchChange(searchInput.value)">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Contenu principal -->
  <div class="search-content">
    <div class="container">
      <div class="search-layout">

        <!-- Sidebar filtres -->
        <aside class="filters-sidebar">
          <div class="filters-container">

            <!-- Filtres rapides -->
            <div class="filter-section">
              <h3 class="filter-title">Filtres rapides</h3>
              <div class="quick-filters">
                <button
                  class="quick-filter-btn"
                  [class.active]="quickFilters.kitchen"
                  (click)="toggleQuickFilter('kitchen')">
                  <i class="fas fa-utensils"></i>
                  <span>Cuisine</span>
                </button>
                <button
                  class="quick-filter-btn"
                  [class.active]="quickFilters.privateShower"
                  (click)="toggleQuickFilter('privateShower')">
                  <i class="fas fa-shower"></i>
                  <span>Douche privée</span>
                </button>
                <button
                  class="quick-filter-btn"
                  [class.active]="quickFilters.parking"
                  (click)="toggleQuickFilter('parking')">
                  <i class="fas fa-parking"></i>
                  <span>Parking</span>
                </button>
              </div>
            </div>

            <!-- Filtres avancés -->
            <div class="filter-section">
              <app-advanced-search-filters
                [initialFilters]="currentFilters"
                [resultCount]="(searchResults$ | async)?.length || 0"
                [canSaveSearch]="true"
                (filtersChanged)="onFiltersChanged($event)"
                (searchRequested)="onSearchRequested($event)"
                (saveSearchRequested)="onSaveSearch($event)"
                (resetRequested)="onResetFilters()">
              </app-advanced-search-filters>
            </div>

          </div>
        </aside>

        <!-- Zone des résultats -->
        <main class="results-main">

          <!-- Toolbar des résultats -->
          <div class="results-toolbar">
            <div class="results-info">
              <h2 class="results-count">{{ (searchResults$ | async)?.length || 0 }} unités disponibles</h2>

              <!-- Filtres actifs -->
              <div class="active-filters" *ngIf="activeFilters.length > 0">
                <span class="active-filters-label">Filtres actifs :</span>
                <div class="filter-tags">
                  <span *ngFor="let filter of activeFilters" class="filter-tag">
                    {{ filter.label }}
                    <button (click)="removeFilter(filter)" class="remove-filter">
                      <i class="fas fa-times"></i>
                    </button>
                  </span>
                </div>
                <button (click)="clearAllFilters()" class="clear-filters">
                  Tout effacer
                </button>
              </div>
            </div>

            <div class="results-controls">
              <!-- Tri -->
              <div class="sort-control">
                <select class="sort-select" (change)="onSortChange($event)">
                  <option value="">Trier par</option>
                  <option *ngFor="let option of sortOptions" [value]="option.value">
                    {{ option.content }}
                  </option>
                </select>
                <i class="fas fa-chevron-down sort-icon"></i>
              </div>

              <!-- Vue -->
              <div class="view-toggle">
                <button
                  (click)="onViewChange('grid')"
                  [class.active]="currentView === 'grid'"
                  class="view-btn"
                  title="Vue grille">
                  <i class="fas fa-th"></i>
                </button>
                <button
                  (click)="onViewChange('list')"
                  [class.active]="currentView === 'list'"
                  class="view-btn"
                  title="Vue liste">
                  <i class="fas fa-list"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Résultats -->
          <div class="results-container">
            <room-filtered-found [viewMode]="currentView"></room-filtered-found>
          </div>

        </main>
      </div>
    </div>
  </div>
</div>
