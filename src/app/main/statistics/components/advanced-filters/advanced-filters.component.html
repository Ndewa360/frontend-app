<div class="advanced-filters">
  <!-- Filter Toggle Button -->
  <div class="filter-header">
    <button 
      type="button" 
      class="filter-toggle"
      (click)="toggleExpanded()"
      [class.expanded]="isExpanded">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" 
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Filtres avancés
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    
    <button 
      type="button" 
      class="reset-button"
      (click)="onResetFilters()"
      title="Réinitialiser les filtres">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Filter Panel -->
  <div class="filter-panel" [class.expanded]="isExpanded" [formGroup]="filterForm">
    <div class="filter-content">
      
      <!-- Period Selection -->
      <div class="filter-section">
        <h4 class="section-title">Période</h4>
        <div class="period-controls">
          <div class="year-selector">
            <label>Année de début</label>
            <select formControlName="startYear" class="year-select">
              <option *ngFor="let year of availableYears" [value]="year">{{ year }}</option>
            </select>
          </div>
          
          <div class="year-selector" *ngIf="currentFilters.comparisonMode">
            <label>Année de fin</label>
            <select formControlName="endYear" class="year-select">
              <option *ngFor="let year of availableYears" [value]="year">{{ year }}</option>
            </select>
          </div>
        </div>
        
        <div class="comparison-toggle">
          <label class="toggle-label">
            <input 
              type="checkbox" 
              formControlName="comparisonMode"
              class="toggle-input">
            <span class="toggle-slider"></span>
            Mode comparaison
          </label>
        </div>
      </div>

      <!-- Property Selection -->
      <div class="filter-section" *ngIf="properties.length > 0">
        <h4 class="section-title">Propriétés</h4>
        <div class="property-grid">
          <div 
            *ngFor="let property of properties" 
            class="property-item"
            [class.selected]="isPropertySelected(property._id)"
            (click)="toggleProperty(property._id)">
            <div class="property-info">
              <span class="property-name">{{ property.name }}</span>
              <span class="property-location">{{ property.geolocationCity?.fullName }}, {{ property.geolocationCountry?.fullName }}</span>
            </div>
            <div class="property-checkbox">
              <svg *ngIf="isPropertySelected(property._id)" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Data Type Selection -->
      <div class="filter-section">
        <h4 class="section-title">Types de données</h4>
        <div class="data-type-grid">
          <div 
            *ngFor="let dataType of dataTypeOptions" 
            class="data-type-item"
            [class.selected]="isDataTypeSelected(dataType.value)"
            (click)="toggleDataType(dataType.value)">
            <div class="data-type-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Icon will be dynamically loaded based on dataType.icon -->
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              </svg>
            </div>
            <span class="data-type-label">{{ dataType.label }}</span>
            <div class="data-type-checkbox">
              <svg *ngIf="isDataTypeSelected(dataType.value)" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
