<div class="app-card chart-error">
  <div class="app-card__header">
    <div class="app-expressive-heading-03 text-center mb-4">{{ title }}</div>
    
    <div class="error-container" [style.height]="height">
      <div class="error-content">
        <!-- Error icon -->
        <div class="error-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" 
                  fill="#dc2626" stroke="#dc2626" stroke-width="2"/>
            <path d="M12 8v4m0 4h.01" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        
        <!-- Error message -->
        <div class="error-message">
          <h4>Erreur de chargement</h4>
          <p>{{ error?.message || 'Une erreur est survenue lors du chargement des données.' }}</p>
          <small *ngIf="error?.code" class="error-code">Code: {{ error.code }}</small>
        </div>
        
        <!-- Retry button -->
        <button 
          type="button" 
          class="retry-button"
          (click)="onRetry()"
          title="Réessayer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Réessayer
        </button>
      </div>
    </div>
  </div>
</div>
