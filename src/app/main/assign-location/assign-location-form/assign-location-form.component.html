<form [formGroup]="formGroup"  class="assign-location" (ngSubmit)="onSubmit()">
    <div class="px-4 py-3">
        <div class="app-form">
            <div fxLayout="row wrap" class="app-form__row">
                <div fxFlex="100%"  class="app-form__item">
                    <ibm-label  [invalid]="isValid('roomId')" [invalidText]="'ASSIGNMENT.UNIT_REQUIRED' | translate">
                    {{ 'ASSIGNMENT.CHOOSE_UNIT' | translate }} 
                        <ibm-combo-box class="mt-2"
                        [items]="roomList"
                        formControlName="roomId"
                        theme="dark"
                        size="lg">
                        <ibm-dropdown-list></ibm-dropdown-list>
                    </ibm-combo-box>   
                    </ibm-label>
                </div>

                <div fxFlex="100%"  class="app-form__item">
                    <ibm-label [invalid]="isValid('locataireId')" [invalidText]="'ASSIGNMENT.TENANT_REQUIRED' | translate">
                    {{ 'ASSIGNMENT.CHOOSE_TENANT' | translate }} 
                        <ibm-combo-box class="mt-2"
                            [items]="locataireList"
                            formControlName="locataireId"
                            theme="dark"
                            size="lg">
                            <ibm-dropdown-list></ibm-dropdown-list>
                        </ibm-combo-box>   
                    </ibm-label>
                </div>

                <div fxLayout="row wrap" class="app-form__row">              
                    <div fxFlex="100%" fxFlex.gt-md="40%" class="app-form__item">
                      <ibm-toggle formControlName="isKnowExactDateEntry" [label]="'ASSIGNMENT.KNOW_ENTRY_DATE' | translate" [onText]="'COMMON.YES' | translate" [offText]="'COMMON.NO' | translate" [checked]="false" size="md">
                      </ibm-toggle>
                    </div>
                    <div fxFlex="100%" fxFlex.gt-md="50%" class="app-form__item">
                        <ibm-date-picker
                            formControlName="startedDate"
                            [label]="'ASSIGNMENT.TENANT_ENTRY_DATE' | translate"
                            [placeholder]="'dd/mm/yyyy'"
                            [language]="'fr'"
                            [size]="'lg'"
                            [theme]="'dark'"
                            [disabled]="false"
                            [invalid]="false"
                            [invalidText]="''"
                            [dateFormat]="'d/m/Y'"
                            [disabled]="true">
                        </ibm-date-picker>
                    </div>
                  </div>

                  <div fxLayout="row wrap" class="app-form__row">              
                    <div fxFlex="100%" fxFlex.gt-md="50%" class="app-form__item">
                        <ibm-label [invalid]="isValid('locataireId')" [invalidText]="'ASSIGNMENT.FINANCIAL_STATE_REQUIRED' | translate">
                            {{ 'ASSIGNMENT.TENANT_BALANCE' | translate }} 
                                <ibm-combo-box class="mt-2"
                                    [items]="fiancialStateList"
                                    formControlName="initialFinancialState"
                                    theme="dark"
                                    size="lg">
                                    <ibm-dropdown-list></ibm-dropdown-list>
                                </ibm-combo-box>   
                            </ibm-label>
                    </div>
                    <div fxFlex="100%" fxFlex.gt-md="50%" class="app-form__item">
                        <ibm-label> {{ 'ASSIGNMENT.AMOUNT' | translate }} ({{getMoney()}})
                            <ibm-number class="mt-2" [helperText]="''" [theme]="'dark'" [invalid]="false"
                              [invalidText]="''" [size]="'md'" formControlName="initialSolde" [disabled]="true">
                            </ibm-number>
                          </ibm-label>
                    </div>
                  </div>
                

                <div class="sm:col-span-3 mb-6">
                    <youpez-alert
                        [appearance]="'outline'"
                        [type]="'info'">
                        {{ 'ASSIGNMENT.AUTO_BILLING_INFO' | translate }}
                    </youpez-alert>
                </div>

            </div>
        </div>
        
        
    </div>
</form>
