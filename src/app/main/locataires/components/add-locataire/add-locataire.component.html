<div class="modal-container">
  <div class="modal-header">
    <h2 class="modal-title">
      <i class="fas fa-user-plus mr-3"></i>
      Ajouter un nouveau locataire
    </h2>
    <button class="modal-close-btn" (click)="onCancel()" type="button">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="modal-body">
    <form [formGroup]="formGroup" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <!-- Informations personnelles -->
        <div class="form-section">
          <h3 class="section-title">
            <i class="fas fa-user mr-2"></i>
            Informations personnelles
          </h3>
          
          <div class="form-row">
            <div class="form-group">
              <label for="fullName" class="form-label required">Nom complet</label>
              <input
                id="fullName"
                type="text"
                formControlName="fullName"
                class="form-control"
                [class.error]="fullName?.invalid && fullName?.touched"
                placeholder="Nom et prénom du locataire">
              <div *ngIf="fullName?.invalid && fullName?.touched" class="error-message">
                <i class="fas fa-exclamation-circle mr-1"></i>
                Le nom complet est requis
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email" class="form-label">Email</label>
              <input
                id="email"
                type="email"
                formControlName="email"
                class="form-control"
                [class.error]="email?.invalid && email?.touched"
                placeholder="adresse@email.com">
              <div *ngIf="email?.invalid && email?.touched" class="error-message">
                <i class="fas fa-exclamation-circle mr-1"></i>
                Veuillez saisir une adresse email valide
              </div>
            </div>

            <div class="form-group">
              <label for="phone" class="form-label">Téléphone</label>
              <input
                id="phone"
                type="tel"
                formControlName="phone"
                class="form-control"
                [class.error]="phone?.invalid && phone?.touched"
                placeholder="+33 6 12 34 56 78">
              <div *ngIf="phone?.invalid && phone?.touched" class="error-message">
                <i class="fas fa-exclamation-circle mr-1"></i>
                Veuillez saisir un numéro de téléphone valide
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full-width">
              <label for="address" class="form-label">Adresse</label>
              <textarea
                id="address"
                formControlName="address"
                class="form-control"
                rows="2"
                placeholder="Adresse complète du locataire"></textarea>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="profession" class="form-label">Profession</label>
              <input
                id="profession"
                type="text"
                formControlName="profession"
                class="form-control"
                placeholder="Profession du locataire">
            </div>
          </div>
        </div>

        <!-- Contact d'urgence -->
        <div class="form-section">
          <h3 class="section-title">
            <i class="fas fa-phone mr-2"></i>
            Contact d'urgence
          </h3>
          
          <div class="form-row">
            <div class="form-group">
              <label for="emergencyContact" class="form-label">Nom du contact</label>
              <input
                id="emergencyContact"
                type="text"
                formControlName="emergencyContact"
                class="form-control"
                placeholder="Nom du contact d'urgence">
            </div>

            <div class="form-group">
              <label for="emergencyPhone" class="form-label">Téléphone d'urgence</label>
              <input
                id="emergencyPhone"
                type="tel"
                formControlName="emergencyPhone"
                class="form-control"
                [class.error]="emergencyPhone?.invalid && emergencyPhone?.touched"
                placeholder="+33 6 12 34 56 78">
              <div *ngIf="emergencyPhone?.invalid && emergencyPhone?.touched" class="error-message">
                <i class="fas fa-exclamation-circle mr-1"></i>
                Veuillez saisir un numéro de téléphone valide
              </div>
            </div>
          </div>
        </div>

        <!-- Notes -->
        <div class="form-section">
          <h3 class="section-title">
            <i class="fas fa-sticky-note mr-2"></i>
            Notes additionnelles
          </h3>
          
          <div class="form-row">
            <div class="form-group full-width">
              <label for="notes" class="form-label">Notes</label>
              <textarea
                id="notes"
                formControlName="notes"
                class="form-control"
                rows="3"
                placeholder="Notes ou informations supplémentaires sur le locataire"></textarea>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="waittingResponse">
      <i class="fas fa-times mr-2"></i>
      Annuler
    </button>
    <button type="submit" class="btn btn-primary" (click)="onSubmit()" [disabled]="!formGroup.valid || waittingResponse">
      <div class="spinner" *ngIf="waittingResponse"></div>
      <i class="fas fa-save mr-2" *ngIf="!waittingResponse"></i>
      {{ waittingResponse ? 'Création...' : 'Créer le locataire' }}
    </button>
  </div>
</div>
