<!-- Modal d'édition de pays -->
<div class="country-edit-modal">
  
  <!-- En-tête -->
  <div class="modal-header">
    <div class="header-content">
      <div class="header-info">
        <div class="icon-container">
          <i class="fas fa-edit"></i>
        </div>
        <div class="header-text">
          <h2 class="modal-title">Modifier le pays</h2>
          <p class="modal-subtitle">{{ data.country.name }}</p>
        </div>
      </div>
      <button class="close-btn" (click)="onCancel()" [disabled]="isLoading$ | async">
        <i class="fas fa-times"></i>
      </button>
    </div>
  </div>

  <!-- Contenu -->
  <div class="modal-content">
    <form [formGroup]="countryForm" (ngSubmit)="onSave()">
      
      <!-- Informations de base -->
      <div class="form-section">
        <h3 class="section-title">
          <i class="fas fa-info-circle mr-2"></i>
          Informations de base
        </h3>
        
        <div class="form-grid">
          <!-- Nom du pays -->
          <div class="form-group">
            <label class="form-label" for="name">
              Nom du pays <span class="required">*</span>
            </label>
            <input 
              type="text" 
              id="name"
              class="form-input"
              [class.error]="hasError('name')"
              formControlName="name"
              placeholder="Nom complet du pays">
            <div class="error-message" *ngIf="hasError('name')">
              {{ getErrorMessage('name') }}
            </div>
          </div>

          <!-- Code pays -->
          <div class="form-group">
            <label class="form-label" for="code">
              Code pays <span class="required">*</span>
            </label>
            <input 
              type="text" 
              id="code"
              class="form-input"
              [class.error]="hasError('code')"
              formControlName="code"
              placeholder="Ex: CM, FR, US"
              maxlength="3">
            <div class="error-message" *ngIf="hasError('code')">
              {{ getErrorMessage('code') }}
            </div>
          </div>

          <!-- Devise -->
          <div class="form-group">
            <label class="form-label" for="currency">
              Devise <span class="required">*</span>
            </label>
            <select 
              id="currency"
              class="form-select"
              [class.error]="hasError('currency')"
              formControlName="currency">
              <option value="">Sélectionnez une devise</option>
              <option *ngFor="let currency of currencies" [value]="currency.code">
                {{ currency.code }} - {{ currency.name }} ({{ currency.symbol }})
              </option>
            </select>
            <div class="error-message" *ngIf="hasError('currency')">
              {{ getErrorMessage('currency') }}
            </div>
          </div>

          <!-- Capitale -->
          <div class="form-group">
            <label class="form-label" for="capital">
              Capitale
            </label>
            <input 
              type="text" 
              id="capital"
              class="form-input"
              formControlName="capital"
              placeholder="Capitale du pays">
          </div>

          <!-- Code téléphone -->
          <div class="form-group">
            <label class="form-label" for="phoneCode">
              Code téléphone
            </label>
            <input 
              type="text" 
              id="phoneCode"
              class="form-input"
              formControlName="phoneCode"
              placeholder="Ex: +237, +33, +1">
          </div>

          <!-- Fuseau horaire -->
          <div class="form-group">
            <label class="form-label" for="timezone">
              Fuseau horaire
            </label>
            <select 
              id="timezone"
              class="form-select"
              formControlName="timezone">
              <option value="">Sélectionnez un fuseau horaire</option>
              <option *ngFor="let tz of timezones" [value]="tz">
                {{ tz }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- Statut -->
      <div class="form-section">
        <h3 class="section-title">
          <i class="fas fa-toggle-on mr-2"></i>
          Statut
        </h3>
        
        <div class="status-toggle">
          <label class="toggle-container">
            <input 
              type="checkbox" 
              class="toggle-input"
              formControlName="isActive">
            <span class="toggle-slider"></span>
            <span class="toggle-label">
              Pays actif
            </span>
          </label>
          <p class="toggle-description">
            Un pays actif peut être sélectionné par les utilisateurs lors de l'inscription ou de la création de propriétés.
          </p>
        </div>
      </div>

    </form>
  </div>

  <!-- Actions -->
  <div class="modal-actions">
    <button 
      type="button"
      class="action-btn secondary"
      (click)="onCancel()"
      [disabled]="isLoading$ | async">
      Annuler
    </button>
    <button 
      type="button"
      class="action-btn primary"
      (click)="onSave()"
      [disabled]="countryForm.invalid || (isLoading$ | async)">
      <i class="fas fa-save mr-2"></i>
      <span *ngIf="!(isLoading$ | async)">Sauvegarder</span>
      <span *ngIf="isLoading$ | async">
        <i class="fas fa-spinner fa-spin mr-2"></i>
        Sauvegarde...
      </span>
    </button>
  </div>
</div>
