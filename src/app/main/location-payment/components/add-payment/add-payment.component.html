<!-- Modal moderne pour ajout de paiement -->
<div class="modern-payment-modal">
  <!-- Header du modal -->
  <div class="modal-header">
    <div class="header-content">
      <div class="header-icon">
        <i class="fa fa-credit-card"></i>
      </div>
      <div class="header-text">
        <h2 class="modal-title">Ajouter un paiement</h2>
        <p class="modal-subtitle">{{ getRoomDisplayInfo() }}</p>
      </div>
    </div>
    <button class="close-btn" (click)="onClose()" type="button">
      <i class="fa fa-times"></i>
    </button>
  </div>

  <!-- Contenu du modal -->
  <form [formGroup]="formGroup" (ngSubmit)="onSubmit()" class="modal-form" id="payment-form">
    <div class="modal-body">
      <!-- Informations de l'unité -->
      <div class="info-section">
        <h3 class="section-title">
          <i class="fa fa-info-circle mr-2"></i>
          Informations de l'unité
        </h3>
        <div class="info-grid">
          <div class="info-item">
            <label class="info-label">Numéro de l'unité</label>
            <div class="info-value">
              <i class="fa fa-home mr-2"></i>
              #{{ getRoomCode() }}
            </div>
          </div>
          <div class="info-item">
            <label class="info-label">Locataire</label>
            <div class="info-value">
              <i class="fa fa-user mr-2"></i>
              {{ getTenantName() }}
            </div>
          </div>
        </div>
      </div>

      <!-- Formulaire de paiement -->
      <div class="form-section">
        <h3 class="section-title">
          <i class="fa fa-credit-card mr-2"></i>
          Détails du paiement
        </h3>
        <div class="form-grid">
          <!-- Type de paiement -->
          <div class="form-group">
            <label class="form-label">
              <i class="fa fa-tag"></i>
              Type de paiement <span class="required">*</span>
            </label>
            <div class="custom-select-wrapper">
              <select class="custom-select" formControlName="paymentLocationType">
                <option value="" disabled>Choisir le type de paiement</option>
                <option *ngFor="let type of paymentTypeList" [value]="type.valueType">
                  {{ type.content }}
                </option>
              </select>
              <i class="fa fa-chevron-down select-arrow"></i>
            </div>
            <div *ngIf="formGroup.get('paymentLocationType')?.invalid && formGroup.get('paymentLocationType')?.touched"
                 class="error-message">
              <i class="fa fa-exclamation-circle"></i>
              Veuillez choisir le type de paiement
            </div>
          </div>

          <!-- Montant -->
          <div class="form-group">
            <label class="form-label">
              <i class="fa fa-money-bill-wave"></i>
              Montant payé <span class="required">*</span>
            </label>
            <div class="input-wrapper">
              <input
                type="number"
                class="custom-input"
                formControlName="locationPaymentPrice"
                placeholder="Entrer le montant"
                min="1000">
              <span class="input-suffix">FCFA</span>
            </div>
            <div *ngIf="formGroup.get('locationPaymentPrice')?.invalid && formGroup.get('locationPaymentPrice')?.touched"
                 class="error-message">
              <i class="fa fa-exclamation-circle"></i>
              Le montant doit être au moins de 1000 FCFA
            </div>
          </div>

          <!-- Date de versement -->
          <div class="form-group">
            <label class="form-label">
              <i class="fa fa-calendar"></i>
              Date de versement <span class="required">*</span>
            </label>
            <div class="input-wrapper">
              <input
                type="date"
                class="custom-input"
                formControlName="datePayment"
                placeholder="Sélectionner la date">
            </div>
            <div *ngIf="formGroup.get('datePayment')?.invalid && formGroup.get('datePayment')?.touched"
                 class="error-message">
              <i class="fa fa-exclamation-circle"></i>
              La date de versement est requise
            </div>
          </div>

          <!-- Commentaire -->
          <div class="form-group">
            <label class="form-label">
              <i class="fa fa-comment"></i>
              Commentaire sur le paiement
            </label>
            <div class="textarea-wrapper">
              <textarea
                class="custom-textarea"
                formControlName="reason"
                placeholder="Ajouter un commentaire (optionnel)"
                rows="3"></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>

  <!-- Footer du modal -->
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="onClose()">
      <i class="fa fa-times"></i>
      Annuler
    </button>
    <button type="button" class="btn btn-primary" [disabled]="waittingResponse || formGroup.invalid" (click)="onSubmit()">
      <i *ngIf="waittingResponse" class="fa fa-spinner fa-spin"></i>
      <i *ngIf="!waittingResponse" class="fa fa-save"></i>
      {{ waittingResponse ? 'Traitement...' : 'Ajouter le paiement' }}
    </button>
  </div>
</div>
