<div class="relative w-full overflow-hidden  overflow-hidden rounded-lg">
  <div class="nav-button-change-fullscreen w-full block invisible" *ngIf="shouldshowFullScreen">
    <button  class="absolute btn-text-edit  transform -translate-y-1/2 bg-gray-800 text-white p-2 rounded-full hover:bg-gray-300 focus:outline-none transition"
      (click)="showFullScreenViewer($event)" >
      <i class="fa-solid fa-expand"></i>
    </button>
  </div>
  <swiper-container appSwiper #swiper [config]="swiperConfig" thumbs-swiper=".mySwiper2" (slidechange)="slideChange($event)">
    <swiper-slide *ngFor="let item of images">
      <!-- <div class="ratio ratio-4x3" [ngStyle]="{background: 'url(' + item +') no-repeat top center / contain'}"></div> -->
      <img [src]="item" width="50"  class="w-full h-full object-cover" />

    </swiper-slide>
  </swiper-container>
  <!-- /image -->


</div>
