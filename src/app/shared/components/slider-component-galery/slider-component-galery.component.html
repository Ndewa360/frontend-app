<div class="relative w-full overflow-hidden  overflow-hidden rounded-lg">
    <!-- Carousel wrapper -->
    <div 
      class="flex transition-transform duration-500 ease-in-out" [ngStyle]="{ transform: 'translateX(' + (-currentIndex * 100) + '%)' }"
    >
      <div  *ngFor="let image of images; let i = index"  class="w-full flex-shrink-0" [ngClass]="{'px-10 py-10':!shouldshowFullScreen}">
        <!-- <img src="assets/img/utils/house.png" alt="" width="150" srcset=""> -->

        <img [src]="image" width="150"  alt="Image {{ i + 1 }}" class="w-full h-full object-cover" />
      </div>
    </div>
  
    <div class="nav-button-change-fullscreen w-full block invisible" *ngIf="shouldshowFullScreen">
      <button  class="absolute btn-text-edit  transform -translate-y-1/2 bg-gray-800 text-white p-2 rounded-full hover:bg-gray-300 focus:outline-none transition"
        (click)="showFullScreenViewer($event)" >
        <i class="fa-solid fa-expand"></i>
      </button>
    </div>
    <!-- Navigation buttons -->
     <div class="nav-button-change-slider invisible group-hover:visible " *ngIf="shouldShowNavSlider">
      <button type="button" class="flex btn-text-edit absolute top-1/2 left-3 z-40 items-center justify-center w-10 h-10 bg-gray-200/50 rounded-full hover:bg-gray-300 focus:outline-none transition"
          data-carousel-prev (click)="prevSlide($event)">
          <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg>
      </button>
      <button type="button" class="flex absolute btn-text-edit top-1/2 right-0 z-40 items-center justify-center w-10 h-10 bg-gray-200/50 rounded-full hover:bg-gray-300 focus:outline-none transition"
            data-carousel-next (click)="nextSlide($event)">
            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
        </button>
     </div>
    
  
    <!-- Indicators -->
    <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex space-x-2">
      <span 
        *ngFor="let _ of images; let i = index" 
        (click)="goToSlide(i)"
        [class]="
          'w-3 h-3 rounded-full bg-white cursor-pointer transition-opacity duration-300 ' + 
          (i === currentIndex ? 'opacity-100' : 'opacity-50')
        "
      ></span>
    </div>
  </div>
