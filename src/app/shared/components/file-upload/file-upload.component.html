<div (dragover)="dragEnter($event)" (drop)="dropFile($event)" (dragleave)="dragLeave($event)" (click)="clickToFile()" class="bg-gray-50 dark:hover:bg-bray-800 dark:bg-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:hover:border-gray-500 dark:hover:bg-gray-600 w-full border-2 border-gray-300 border-dashed rounded-lg cursor-pointer  upload-file-drop-zone" #dropzone>
    <div  *ngIf="files.length==0" for="dropzone-file" class="flex flex-col items-center justify-center w-full h-32 ">
        <div  class="flex flex-col items-center justify-center pt-5 pb-6">
            <svg class="w-10 h-10 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            <p class="mb-2 text-sm text-gray-500 dark:text-gray-400"><span class="font-semibold">Cliquer pour uploader</span> ou déplacer dessus</p>
            <p class="text-xs text-gray-500 dark:text-gray-400">{{acceptedFile}}</p>
        </div>              
    </div>
    <div class="grid grid-cols-6  m-4 gap-4">
        <div *ngFor="let file of files;let i=index" class="relative flex flex-col items-center overflow-hidden text-center bg-gray-100 border rounded select-none"
            style="padding-top: 100%;"  draggable="true" >
            
            <button class="absolute top-0 right-0 z-50 p-1 bg-white rounded-bl focus:outline-none" type="button" (click)="remove($event,i)">
                <svg class="w-4 h-4 text-gray-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
            <ng-container *ngIf="files[i].type.includes('audio/')">
                <svg class="absolute w-12 h-12 text-gray-400 transform top-1/2 -translate-y-2/3"
                    xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
            </ng-container>
            <ng-container *ngIf="files[i].type.includes('application/') || files[i].type === ''">
                <svg class="absolute w-12 h-12 text-gray-400 transform top-1/2 -translate-y-2/3"
                    xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
            </ng-container>
            <ng-container *ngIf="files[i].type.includes('image/')">
                <img class="absolute inset-0 z-0 object-cover w-full h-full border-4 border-white preview"
                    [src]="loadFile(files[i])" />
            </ng-container>
            <ng-container *ngIf="files[i].type.includes('video/')">
                <video [src]="loadFile(files[i])" type="video/mp4" class="absolute inset-0 object-cover w-full h-full border-4 border-white pointer-events-none preview">
                </video>
            </ng-container>
            <div class="absolute bottom-0 left-0 right-0 flex flex-col p-2 text-xs bg-white bg-opacity-50">
                <span class="w-full font-bold text-gray-900 truncate">{{files[i].name?files[i].name:'Loading'}}</span>
                <span class="text-xs text-gray-900" >{{humanFileSize(files[i].size)}}</span>
            </div>

            <!-- <div class="absolute inset-0 z-40 transition-colors duration-300" @dragenter="dragenter($event)"
                class="{'bg-blue-200 bg-opacity-80': fileDropping == index && fileDragging != index}">
            </div> -->
        </div>
    </div>

    <input id="dropzone-file" #inputDropzone type="file" [accept]="acceptedFileType" [multiple]="isMultiple" class="hidden" (change)="uploadFile($event)"/>
</div>
