<!-- Panneau de notifications intelligentes -->
<div class="smart-notifications" [class.open]="isOpen">
  <!-- Header -->
  <div class="notifications-header">
    <div class="flex items-center justify-between p-4 border-b border-gray-200">
      <div class="flex items-center">
        <youpez-ibm-icon iconName="notification" iconSize="20" class="mr-2"></youpez-ibm-icon>
        <h3 class="app-productive-heading-03">Notifications</h3>
        <span *ngIf="unreadCount > 0" 
              class="ml-2 px-2 py-1 text-xs bg-red-500 text-white rounded-full">
          {{ unreadCount }}
        </span>
      </div>
      
      <div class="flex items-center space-x-2">
        <!-- Bouton paramètres -->
        <button ibmButton="ghost" 
                size="sm" 
                class="bx--btn--icon-only"
                [ngbTooltip]="'Paramètres'"
                (click)="openSettings()">
          <youpez-ibm-icon iconName="settings" iconSize="16"></youpez-ibm-icon>
        </button>
        
        <!-- Bouton marquer tout comme lu -->
        <button ibmButton="ghost" 
                size="sm" 
                class="bx--btn--icon-only"
                [ngbTooltip]="'Marquer tout comme lu'"
                [disabled]="unreadCount === 0"
                (click)="markAllAsRead()">
          <youpez-ibm-icon iconName="checkmark--outline" iconSize="16"></youpez-ibm-icon>
        </button>
        
        <!-- Bouton fermer -->
        <button ibmButton="ghost" 
                size="sm" 
                class="bx--btn--icon-only"
                (click)="close()">
          <youpez-ibm-icon iconName="close" iconSize="16"></youpez-ibm-icon>
        </button>
      </div>
    </div>
  </div>

  <!-- Filtres rapides -->
  <div class="notifications-filters p-3 border-b border-gray-100">
    <div class="flex flex-wrap gap-2">
      <button *ngFor="let filter of quickFilters"
              [class]="getFilterButtonClass(filter)"
              (click)="setActiveFilter(filter.type)"
              size="sm">
        <youpez-ibm-icon [iconName]="filter.icon" iconSize="16" class="mr-1"></youpez-ibm-icon>
        {{ filter.label }}
        <span *ngIf="filter.count > 0" class="ml-1 text-xs">
          ({{ filter.count }})
        </span>
      </button>
    </div>
  </div>

  <!-- Liste des notifications -->
  <div class="notifications-list">
    <ng-container *ngIf="filteredNotifications.length > 0; else noNotifications">
      <div *ngFor="let notification of filteredNotifications; trackBy: trackByNotificationId"
           class="notification-item"
           [class.unread]="!notification.isRead"
           [class.critical]="notification.priority === 'critical'"
           [class.high]="notification.priority === 'high'"
           [class.medium]="notification.priority === 'medium'"
           [class.low]="notification.priority === 'low'"
           (click)="onNotificationClick(notification)">
        
        <!-- Indicateur de priorité -->
        <div class="priority-indicator"></div>
        
        <!-- Icône de type -->
        <div class="notification-icon">
          <youpez-ibm-icon [iconName]="getNotificationIcon(notification.type)" 
                           iconSize="20"
                           [class]="getNotificationIconClass(notification.priority)">
          </youpez-ibm-icon>
        </div>
        
        <!-- Contenu -->
        <div class="notification-content flex-1">
          <div class="notification-header flex items-start justify-between">
            <h4 class="notification-title app-label-01 font-medium">
              {{ notification.title }}
            </h4>
            <span class="notification-time app-helper-text-01 text-xs">
              {{ getRelativeTime(notification.createdAt) }}
            </span>
          </div>
          
          <p class="notification-message app-body-short-01 text-gray-600 mt-1">
            {{ notification.message }}
          </p>
          
          <!-- Action button -->
          <div *ngIf="notification.actionLabel" class="notification-action mt-2">
            <button ibmButton="tertiary" 
                    size="sm"
                    (click)="onActionClick(notification, $event)">
              {{ notification.actionLabel }}
            </button>
          </div>
        </div>
        
        <!-- Actions -->
        <div class="notification-actions">
          <button ibmButton="ghost" 
                  size="sm" 
                  class="bx--btn--icon-only"
                  [ngbTooltip]="notification.isRead ? 'Marquer comme non lu' : 'Marquer comme lu'"
                  (click)="toggleReadStatus(notification, $event)">
            <youpez-ibm-icon [iconName]="notification.isRead ? 'view--off' : 'view'" 
                             iconSize="16">
            </youpez-ibm-icon>
          </button>
          
          <button ibmButton="ghost" 
                  size="sm" 
                  class="bx--btn--icon-only"
                  [ngbTooltip]="'Supprimer'"
                  (click)="removeNotification(notification, $event)">
            <youpez-ibm-icon iconName="trash-can" iconSize="16"></youpez-ibm-icon>
          </button>
        </div>
      </div>
    </ng-container>
    
    <!-- État vide -->
    <ng-template #noNotifications>
      <div class="empty-state p-8 text-center">
        <youpez-ibm-icon iconName="notification--off" 
                         iconSize="32" 
                         class="text-gray-400 mb-4">
        </youpez-ibm-icon>
        <h3 class="app-productive-heading-03 text-gray-600 mb-2">
          Aucune notification
        </h3>
        <p class="app-body-short-01 text-gray-500">
          {{ getEmptyStateMessage() }}
        </p>
      </div>
    </ng-template>
  </div>

  <!-- Footer avec actions -->
  <div class="notifications-footer p-3 border-t border-gray-100">
    <div class="flex justify-between items-center">
      <span class="app-helper-text-01 text-gray-500">
        {{ filteredNotifications.length }} notification(s)
      </span>
      
      <div class="flex space-x-2">
        <button ibmButton="ghost" 
                size="sm"
                (click)="loadMore()"
                *ngIf="hasMore">
          Charger plus
        </button>
        
        <button ibmButton="tertiary" 
                size="sm"
                (click)="viewAllNotifications()">
          Voir tout
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Overlay -->
<div class="notifications-overlay" 
     *ngIf="isOpen" 
     (click)="close()">
</div>
