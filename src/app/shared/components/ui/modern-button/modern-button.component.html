<!-- Bouton moderne réutilisable -->
<button 
  [type]="type"
  [disabled]="disabled || loading"
  [ngClass]="getButtonClasses()"
  (click)="onClick($event)"
  class="inline-flex items-center justify-center font-medium transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">
  
  <!-- Icône de gauche -->
  <svg *ngIf="leftIcon && !loading" 
       [ngClass]="getIconClasses('left')"
       fill="none" 
       stroke="currentColor" 
       viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="leftIcon"></path>
  </svg>
  
  <!-- Spinner de chargement -->
  <svg *ngIf="loading" 
       [ngClass]="getIconClasses('left')"
       class="animate-spin" 
       fill="none" 
       viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
  </svg>
  
  <!-- Contenu du bouton -->
  <span *ngIf="!iconOnly" [ngClass]="getTextClasses()">
    <ng-content></ng-content>
  </span>
  
  <!-- Icône de droite -->
  <svg *ngIf="rightIcon && !loading" 
       [ngClass]="getIconClasses('right')"
       fill="none" 
       stroke="currentColor" 
       viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="rightIcon"></path>
  </svg>
  
  <!-- Badge de notification -->
  <span *ngIf="badge" 
        class="absolute -top-1 -right-1 h-4 w-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">
    {{ badge }}
  </span>
</button>
