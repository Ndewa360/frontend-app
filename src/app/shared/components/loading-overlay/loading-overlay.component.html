<div *ngIf="currentLoadingState.isLoading" [class]="containerClasses">
  <!-- Spinner avec design moderne -->
  <div class="flex flex-col items-center space-y-4">
    <!-- Spinner animé -->
    <div [class]="spinnerSize + ' animate-spin'">
      <svg class="w-full h-full" style="color: rgb(204, 140, 10);" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
    </div>

    <!-- Message de chargement -->
    <div class="text-center">
      <p class="text-sm font-medium text-gray-700 mb-2">{{ displayMessage }}</p>
      
      <!-- Barre de progression si activée -->
      <div *ngIf="showProgressBar" class="w-64 bg-gray-200 rounded-full h-2">
        <div 
          class="h-2 rounded-full transition-all duration-300 ease-out"
          style="background-color: rgb(204, 140, 10);"
          [style.width.%]="progressValue">
        </div>
        <p class="text-xs text-gray-500 mt-1">{{ progressValue | number:'1.0-0' }}%</p>
      </div>
    </div>

    <!-- Points d'animation pour un effet plus moderne -->
    <div class="flex space-x-1">
      <div class="w-2 h-2 rounded-full animate-pulse" style="background-color: rgb(204, 140, 10); animation-delay: 0ms;"></div>
      <div class="w-2 h-2 rounded-full animate-pulse" style="background-color: rgb(204, 140, 10); animation-delay: 150ms;"></div>
      <div class="w-2 h-2 rounded-full animate-pulse" style="background-color: rgb(204, 140, 10); animation-delay: 300ms;"></div>
    </div>
  </div>

  <!-- Overlay semi-transparent si activé -->
  <div *ngIf="showOverlay" class="absolute inset-0 bg-white bg-opacity-80 backdrop-blur-sm -z-10"></div>
</div>

<!-- Version compacte pour les petits espaces -->
<div *ngIf="currentLoadingState.isLoading && size === 'small'" class="inline-flex items-center space-x-2">
  <div class="w-4 h-4 animate-spin">
    <svg class="w-full h-full" style="color: rgb(204, 140, 10);" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  </div>
  <span class="text-sm text-gray-600">{{ displayMessage }}</span>
</div>
