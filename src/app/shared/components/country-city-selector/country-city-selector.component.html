
<div class="country-city-selector" [class.layout-vertical]="layout === 'vertical'" [class.layout-horizontal]="layout === 'horizontal'">
  <form [formGroup]="selectorForm" style="width:100%;height:100%">
    <!-- Conteneur des sélecteurs -->
    <div class="selectors-container">
      <!-- Sélecteur de pays -->
      <div class="selector-wrapper country-wrapper">
        <label class="selector-label" *ngIf="layout === 'vertical'">
          Pays
          <span class="required-indicator" *ngIf="countryRequired">*</span>
        </label>
        <app-country-selector
          [placeholder]="countryPlaceholder"
          [required]="countryRequired"
          [showFlag]="showCountryFlag"
          [showCode]="showCountryCode"
          [preselectedCountryId]="preselectedCountryId"
          (countrySelected)="onCountrySelected($event)"
          (countryCleared)="onCountryCleared()"
          formControlName="country">
        </app-country-selector>
      </div>
      <!-- Séparateur pour layout horizontal -->
      <div class="selector-separator" *ngIf="layout === 'horizontal'">
        <i class="fas fa-arrow-right"></i>
      </div>
      <!-- Sélecteur de ville -->
      <div class="selector-wrapper city-wrapper">
        <label class="selector-label" *ngIf="layout === 'vertical'">
          Ville
          <span class="required-indicator" *ngIf="cityRequired">*</span>
        </label>
        <app-city-selector
          [placeholder]="cityPlaceholder"
          [required]="cityRequired"
          [countryFilter]="selectedCountry"
          [showRegion]="showCityRegion"
          [showPopulation]="showCityPopulation"
          [preselectedCityId]="preselectedCityId"
          (citySelected)="onCitySelected($event)"
          (cityCleared)="onCityCleared()"
          formControlName="city">
        </app-city-selector>
      </div>
    </div>
    <div class="validation-errors" *ngIf="showValidationErrors && getValidationErrors().length > 0">
      <div class="error-item" *ngFor="let error of getValidationErrors()">
        <i class="fas fa-exclamation-triangle"></i>
        <span>{{ error }}</span>
      </div>
    </div>
  </form>



  <!-- Erreurs de validation -->
  <div class="validation-errors" *ngIf="showValidationErrors && getValidationErrors().length > 0">
    <div class="error-item" *ngFor="let error of getValidationErrors()">
      <i class="fas fa-exclamation-triangle"></i>
      <span>{{ error }}</span>
    </div>
  </div>
</div>
