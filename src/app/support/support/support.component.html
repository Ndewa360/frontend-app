<div class="app-a-box app-scrollbar-fix support">
  <ng-scrollbar>
    <div fxLayout="row" fxLayoutAlign="center start">
      <div fxFlex="100%" fxFlex.gt-md="70%" fxFlex.gt-lg="50%" class="app-content app-content--default">
        <div class="mt-8 mb-8">
          <youpez-logo class="cursor-pointer" [routerLink]="routingLink" logoWidth="200px"></youpez-logo>
        </div>
        <div class="">
          <button [routerLink]="routingLink" ibmButton="ghost" size="sm" class="cds--btn__icon--left -ml-2">
            <youpez-ibm-icon iconName="arrowLeft" iconClass="cds--btn__icon" size="20"></youpez-ibm-icon>
            Retour à l'acceuil
          </button>
        </div>
        <div class="app-productive-heading-06 mb-8">
          Formulaire de Demande d'Assistance
        </div>
        <p class="app-body-long-02 mb-10" >
          Remplissez ce formulaire afin d’obtenir <span class="font-bold">une assistance technique gratuite</span>. Nous garantissons la confidentialité complète des informations qui nous sont fournies.
        </p>
        <form [formGroup]="formGroup" (ngSubmit)="onSubmit()">
          <div class="app-card app-card--m-0 p-4">
            <div class="app-form">  
              <div class="app-form__item">
                <ibm-label
                  [invalidText]="'Email invalide'" [invalid]="isValid('email')">
                  Adresse email <span class="text-red-600">*</span> 
                  <input
                    ibmText
                    size="md"
                    [invalid]="isValid('email')"
                    [disabled]="false"
                    formControlName="email"
                    theme="dark"
                    [placeholder]="''"
                    [autocomplete]="true">
                </ibm-label>
              </div>      
              <div fxLayout="row wrap" class="app-form__row">              
                <div fxFlex="100%"  fxFlex.gt-md="50%" class="app-form__item">
                  <ibm-label
                    [helperText]="''"
                    [invalidText]="'Ce champ est obligatoire ou incorrect'">
                    Nom complet <span class="text-red-600">*</span> 
                    <input
                      ibmText
                      size="md"
                      formControlName="name"
                      [disabled]="false"
                      theme="dark"
                      [placeholder]="'Votre nom complet'"
                      [autocomplete]="true">
                  </ibm-label>
                </div>
                <div class="app-form__item" fxFlex.gt-md="50%">
                  <ibm-label
                  [invalid]="isValid('tel')"
                   helperText="Ex: +237 6xx xx xx xx"
                  [invalidText]="'Format invalide. Ex: +237 6xx xx xx xx'">
                    Tél <span class="text-red-600">*</span> 
                    <input
                      ibmText
                      size="md"
                      [disabled]="false"
                      formControlName="tel"
                      [invalid]="isValid('tel')"
                      [placeholder]="'Numéro de téléphone'"
                      theme="dark"
                      [placeholder]="'Votre numéro de téléphone'"
                      [autocomplete]="true">
                  </ibm-label>
                </div>
              </div>
              <div class="app-form__item">
                <ibm-label
                  [invalidText]="'Sujet obligatoire'" [invalid]="isValid('object')">
                  Sujet <span class="text-red-600">*</span> 
                  <input
                    ibmText
                    size="md"
                    [invalid]="isValid('object')"
                    [disabled]="false"
                    formControlName="object"
                    theme="dark"
                    [placeholder]="'Sujet de la requête'"
                    [autocomplete]="true">
                </ibm-label>
              </div>
              <div class="app-form__item">
                <ibm-label
                  [invalid]="isValid('message')"
                  [helperText]="''" >
                  Décrivez votre problème <span class="text-red-600">*</span> 
                <textarea
                  theme="dark"
                  cdsTextArea 
                  formControlName="message"
                  [invalid]="isValid('message')"
                  size="md"
                  aria-label="textarea"></textarea>
                </ibm-label>
              </div>
            </div>
            <div class="app-form__submit flex justify-end">
              <!-- <button type="submit" ibmButton="primary" size="md">
                Submit
                <svg class="cds--btn__icon" ibmIconArrowRight size="20"></svg>
              </button> -->
              <button type="submit" cdsButton size="md" [disabled]="waittingResponse || formGroup.invalid" class=" text-center custom-primary-button contact-btn " ibmButton="primary" >
                  <ibm-loading *ngIf="waittingResponse; else noWaitingResponse" ></ibm-loading> 
                              <!-- pt-4 pb-4 -->
                <ng-template #noWaitingResponse>
                  <span class="btn-text">Envoyer</span>
                  <youpez-ibm-icon class="mt-6" iconClass="cds--btn__icon" iconName="arrowRight" iconSize="32" ></youpez-ibm-icon >
                </ng-template>
              </button>
            </div>
          </div>
        </form>
        
      </div>
    </div>
  </ng-scrollbar>
</div>
