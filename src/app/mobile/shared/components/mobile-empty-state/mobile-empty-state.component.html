<div class="mobile-empty-state-container">
  <ion-icon [name]="icon" color="medium"></ion-icon>
  <h3>{{ title }}</h3>
  <p>{{ message }}</p>
  <ion-button *ngIf="buttonText" (click)="onButtonClick()" fill="outline" color="primary">
    <ion-icon [name]="buttonIcon" slot="start"></ion-icon>
    {{ buttonText }}
  </ion-button>
</div>
