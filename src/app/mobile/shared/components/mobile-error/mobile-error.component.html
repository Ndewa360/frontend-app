<div class="mobile-error-container">
  <ion-icon name="alert-circle" color="danger"></ion-icon>
  <h3>{{ title }}</h3>
  <p>{{ message }}</p>
  <ion-button *ngIf="showRetry" (click)="onRetry()" fill="outline" color="primary">
    <ion-icon name="refresh" slot="start"></ion-icon>
    Réessayer
  </ion-button>
</div>
