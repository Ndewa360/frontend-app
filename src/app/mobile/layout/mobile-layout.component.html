<ion-app>
  <!-- Header Mobile -->
  <app-mobile-header
    [currentRoute]="currentRoute"
    [isAuthenticated]="isAuthenticated"
    [isOnline]="isOnline">
  </app-mobile-header>

  <!-- Contenu Principal -->
  <ion-router-outlet id="main-content"></ion-router-outlet>

  <!-- Indicateur hors ligne -->
  <div class="offline-indicator" *ngIf="!isOnline">
    <ion-icon [name]="getConnectionIcon()" [color]="getConnectionColor()"></ion-icon>
    <span>Mode hors ligne</span>
  </div>

  <!-- Navigation en bas -->
  <app-mobile-tabs
    [currentRoute]="currentRoute"
    [isAuthenticated]="isAuthenticated">
  </app-mobile-tabs>
</ion-app>
