<ion-content class="mobile-search-page">
  
  <!-- Barre de recherche fixe -->
  <div class="search-header">
    <div class="search-bar-container">
      <ion-searchbar
        [formControl]="searchControl"
        [placeholder]="'SEARCH.MOBILE_PLACEHOLDER' | translate"
        show-clear-button="focus"
        debounce="300"
        class="mobile-searchbar">
      </ion-searchbar>
      
      <!-- Boutons d'action -->
      <div class="search-actions">
        <ion-button 
          (click)="openFilters()"
          fill="outline" 
          size="small"
          class="filter-button">
          <ion-icon name="options" slot="start"></ion-icon>
          Filtres
        </ion-button>
        
        <ion-button 
          (click)="goToMapView()"
          fill="outline" 
          size="small"
          class="map-button">
          <ion-icon name="map" slot="icon-only"></ion-icon>
        </ion-button>
        
        <ion-button 
          (click)="toggleViewMode()"
          fill="outline" 
          size="small"
          class="view-button">
          <ion-icon 
            [name]="viewMode === 'list' ? 'grid' : 'list'" 
            slot="icon-only">
          </ion-icon>
        </ion-button>
      </div>
    </div>
    
    <!-- Indicateur de résultats -->
    <div class="results-indicator" *ngIf="hasResults()">
      <ion-text color="medium">
        {{ getTotalResults() }} logement{{ getTotalResults() > 1 ? 's' : '' }} trouvé{{ getTotalResults() > 1 ? 's' : '' }}
        <span *ngIf="currentCity"> à {{ currentCity }}</span>
      </ion-text>
    </div>
  </div>

  <!-- Contenu principal avec pull-to-refresh -->
  <ion-refresher slot="fixed" (ionRefresh)="refreshResults($event)">
    <ion-refresher-content
      pulling-icon="chevron-down-circle-outline"
      pulling-text="Tirer pour actualiser"
      refreshing-spinner="crescent"
      refreshing-text="Actualisation...">
    </ion-refresher-content>
  </ion-refresher>

  <!-- État de chargement -->
  <div class="loading-container" *ngIf="isLoading$ | async">
    <ion-spinner name="crescent"></ion-spinner>
    <ion-text>Recherche en cours...</ion-text>
  </div>

  <!-- Résultats de recherche -->
  <div class="search-results" *ngIf="!(isLoading$ | async)">
    
    <!-- État vide -->
    <div class="empty-state" *ngIf="!hasResults()">
      <ion-icon name="search" class="empty-icon"></ion-icon>
      <h3>Aucun logement trouvé</h3>
      <p>Essayez de modifier vos critères de recherche ou explorez d'autres villes.</p>
      <ion-button (click)="openFilters()" fill="outline">
        <ion-icon name="options" slot="start"></ion-icon>
        Modifier les filtres
      </ion-button>
    </div>

    <!-- Liste des résultats -->
    <div class="results-container" *ngIf="hasResults()">
      
      <!-- Mode liste -->
      <div class="list-view" *ngIf="viewMode === 'list'">
        <app-mobile-unit-card
          *ngFor="let unit of filteredResults; trackBy: trackByUnitId"
          [unit]="unit"
          [isFavorite]="isFavorite(unit)"
          [viewMode]="'list'"
          (unitClick)="viewUnitDetails(unit)"
          (favoriteToggle)="toggleFavorite(unit)"
          class="unit-card-list">
        </app-mobile-unit-card>
      </div>

      <!-- Mode grille -->
      <div class="grid-view" *ngIf="viewMode === 'grid'">
        <app-mobile-unit-card
          *ngFor="let unit of filteredResults; trackBy: trackByUnitId"
          [unit]="unit"
          [isFavorite]="isUnitFavorite(unit)"
          [viewMode]="'grid'"
          (unitClick)="onUnitClick(unit)"
          (favoriteToggle)="onFavoriteToggle(unit)"
          class="unit-card-grid">
        </app-mobile-unit-card>
      </div>
    </div>
  </div>

  <!-- Pagination infinie -->
  <ion-infinite-scroll 
    threshold="100px" 
    (ionInfinite)="loadMoreResults($event)"
    [disabled]="!hasMoreResults">
    <ion-infinite-scroll-content
      loading-spinner="crescent"
      loading-text="Chargement de plus de résultats...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>

</ion-content>
