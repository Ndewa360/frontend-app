<!-- Carte d'unité mobile -->
<ion-card 
  class="mobile-unit-card"
  [class.list-mode]="viewMode === 'list'"
  [class.grid-mode]="viewMode === 'grid'"
  [class.unavailable]="!isAvailable()"
  (click)="onCardClick()">

  <!-- Section Image -->
  <div class="image-section">
    <img 
      [src]="getMainImage()" 
      [alt]="getRoomType() + ' - ' + getLocation()"
      class="unit-image"
      loading="lazy">
    
    <!-- Overlay avec informations -->
    <div class="image-overlay">
      <!-- Badge de promotion -->
      <ion-badge 
        *ngIf="hasPromotion()" 
        color="warning" 
        class="promotion-badge">
        {{ getPromotionText() }}
      </ion-badge>
      
      <!-- Compteur d'images -->
      <div class="image-counter" *ngIf="getImageCount() > 1">
        <ion-icon name="images"></ion-icon>
        <span>{{ getImageCount() }}</span>
      </div>
      
      <!-- Bouton favori -->
      <ion-button 
        (click)="onFavoriteClick($event)"
        fill="clear" 
        class="favorite-button"
        [class.is-favorite]="isFavorite">
        <ion-icon 
          [name]="isFavorite ? 'heart' : 'heart-outline'"
          [color]="isFavorite ? 'danger' : 'light'">
        </ion-icon>
      </ion-button>
    </div>
    
    <!-- Badge de statut -->
    <ion-badge 
      [color]="getStatusColor()" 
      class="status-badge">
      {{ getStatusLabel() }}
    </ion-badge>
  </div>

  <!-- Section Contenu -->
  <ion-card-content class="card-content">
    
    <!-- En-tête avec prix et type -->
    <div class="content-header">
      <div class="price-section">
        <div class="price">{{ formatPrice(unit.price) }}</div>
        <div class="frequency">/mois</div>
      </div>
      <div class="type-section">
        <ion-text color="medium">{{ getRoomType() }}</ion-text>
      </div>
    </div>

    <!-- Titre et localisation -->
    <div class="property-info">
      <h3 class="property-title">
        {{ unit.property?.name || unit.code || 'Propriété Premium' }}
      </h3>
      <div class="location">
        <ion-icon name="location" color="medium"></ion-icon>
        <ion-text color="medium">{{ getLocation() }}</ion-text>
      </div>
    </div>

    <!-- Équipements (mode liste uniquement) -->
    <div class="amenities" *ngIf="viewMode === 'list' && getMainAmenities().length > 0">
      <ion-chip 
        *ngFor="let amenity of getMainAmenities()" 
        color="light" 
        class="amenity-chip">
        <ion-label>{{ amenity }}</ion-label>
      </ion-chip>
    </div>

    <!-- Note et actions (mode liste uniquement) -->
    <div class="card-footer" *ngIf="viewMode === 'list'">
      <div class="rating">
        <ion-icon name="star" color="warning"></ion-icon>
        <span>{{ getRating().toFixed(1) }}</span>
      </div>
      
      <div class="actions">
        <ion-button 
          fill="outline" 
          size="small"
          color="primary">
          <ion-icon name="call" slot="start"></ion-icon>
          Contacter
        </ion-button>
      </div>
    </div>

    <!-- Version compacte pour mode grille -->
    <div class="grid-footer" *ngIf="viewMode === 'grid'">
      <div class="rating-compact">
        <ion-icon name="star" color="warning"></ion-icon>
        <span>{{ getRating().toFixed(1) }}</span>
      </div>
    </div>

  </ion-card-content>
</ion-card>
