<div class="unit-details">
  <div class="unit-header">
    <h2>{{ unit?.property?.name || 'Détails du logement' }}</h2>
    <ion-badge [color]="getStatusColor()" class="status-badge">
      {{ getStatusLabel() }}
    </ion-badge>
  </div>

  <div class="unit-info">
    <div class="info-item">
      <ion-icon name="location" color="medium"></ion-icon>
      <span>{{ getLocation() }}</span>
    </div>
    
    <div class="info-item">
      <ion-icon name="cash" color="medium"></ion-icon>
      <span>{{ formatPrice(unit?.price) }}</span>
    </div>
    
    <div class="info-item">
      <ion-icon name="home" color="medium"></ion-icon>
      <span>{{ getRoomType() }}</span>
    </div>
  </div>

  <div class="unit-description" *ngIf="unit?.description">
    <h3>Description</h3>
    <p>{{ unit.description }}</p>
  </div>

  <div class="unit-actions">
    <ion-button expand="block" color="primary">
      <ion-icon name="call" slot="start"></ion-icon>
      Contacter le propriétaire
    </ion-button>
    
    <ion-button expand="block" fill="outline" color="primary">
      <ion-icon name="heart" slot="start"></ion-icon>
      Ajouter aux favoris
    </ion-button>
  </div>
</div>
