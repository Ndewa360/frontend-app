<div class="media-gallery">
  <div class="gallery-header">
    <h3>Galerie média</h3>
    <ion-button fill="clear" size="small" (click)="addMedia()">
      <ion-icon name="add" slot="start"></ion-icon>
      Ajouter
    </ion-button>
  </div>

  <div class="media-grid" *ngIf="media.length > 0; else emptyState">
    <div class="media-item" *ngFor="let item of media; trackBy: trackByMediaId">
      <img [src]="item.url" [alt]="item.name" class="media-image" loading="lazy">
      <div class="media-overlay">
        <ion-button fill="clear" size="small" color="danger" (click)="removeMedia(item)">
          <ion-icon name="trash"></ion-icon>
        </ion-button>
      </div>
    </div>
  </div>

  <ng-template #emptyState>
    <div class="empty-gallery">
      <ion-icon name="images" color="medium"></ion-icon>
      <p>Aucune image ajoutée</p>
      <ion-button fill="outline" (click)="addMedia()">
        <ion-icon name="camera" slot="start"></ion-icon>
        Ajouter des photos
      </ion-button>
    </div>
  </ng-template>
</div>
