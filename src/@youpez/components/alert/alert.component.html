<div
    class="youpez-alert-container"
    *ngIf="!dismissible || dismissible && !dismissed"
    [@fadeIn]="!dismissed"
    [@fadeOut]="!dismissed">

    <!-- Border -->
    <div
        class="youpez-alert-border"
        *ngIf="appearance === 'border'"></div>

    <!-- Icon -->
    <div
        class="youpez-alert-icon"
        *ngIf="showIcon">

        <!-- Custom icon -->
        <div class="youpez-alert-custom-icon">
            <ng-content select="[youpezAlertIcon]"></ng-content>
        </div>

        <!-- Default icons -->
        <div class="youpez-alert-default-icon">

            <mat-icon
                *ngIf="type === 'primary'"
                [svgIcon]="'heroicons_solid:check-circle'"></mat-icon>

            <mat-icon
                *ngIf="type === 'accent'"
                [svgIcon]="'heroicons_solid:check-circle'"></mat-icon>

            <mat-icon
                *ngIf="type === 'warn'"
                [svgIcon]="'heroicons_solid:x-circle'"></mat-icon>

            <mat-icon
                *ngIf="type === 'basic'"
                [svgIcon]="'heroicons_solid:check-circle'"></mat-icon>

            <mat-icon
                *ngIf="type === 'info'"
                [svgIcon]="'heroicons_solid:information-circle'"></mat-icon>

            <mat-icon
                *ngIf="type === 'success'"
                [svgIcon]="'heroicons_solid:check-circle'"></mat-icon>

            <mat-icon
                *ngIf="type === 'warning'"
                [svgIcon]="'heroicons_solid:exclamation'"></mat-icon>

            <mat-icon
                *ngIf="type === 'error'"
                [svgIcon]="'heroicons_solid:x-circle'"></mat-icon>

        </div>

    </div>

    <!-- Content -->
    <div class="youpez-alert-content">

        <div class="youpez-alert-title">
            <ng-content select="[youpezAlertTitle]"></ng-content>
        </div>

        <div class="youpez-alert-message">
            <ng-content></ng-content>
        </div>

    </div>

    <!-- Dismiss button -->
    <button
        class="youpez-alert-dismiss-button"
        mat-icon-button
        (click)="dismiss()">
        <!-- <mat-icon [svgIcon]="'heroicons_solid:x'"></mat-icon> -->
        <youpez-ibm-icon iconClass="bx--btn__icon" iconName="close" iconSize="16"></youpez-ibm-icon>

    </button>

</div>
