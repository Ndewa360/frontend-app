<ng-container *ngIf="type === ''">
  <img class="app-logo--black" src="assets/img/logo/logo-big-black.png" [style.width]="logoWidth"/>
  <img class="app-logo--white" src="assets/img/logo/logo.png" [style.width]="logoWidth"/>
</ng-container>

<ng-container *ngIf="type === 'black'">
  <img class="app-logo--force-black" src="assets/img/logo/logo-big-black.png" [style.width]="logoWidth"/>
</ng-container>

<ng-container *ngIf="type === 'nobg-white'">
  <img class="app-logo--force-black" src="assets/img/logo/logo_big_blanc-removebg-preview.png" [style.width]="logoWidth"/>
</ng-container>

<ng-container *ngIf="type === 'white'">
  <!-- <img class="app-logo--force-white" src="assets/img/logo/logo_bg_blanc_no_name.png" [style.width]="logoWidth"/> -->
  <img class="app-logo--force-white" src="assets/img/logo/logo_bg_blanc_no_name-removebg-preview.png" [style.width]="logoWidth"/>
</ng-container>
