  <!-- Configuration TinyMCE pour désactiver la télémétrie -->
  <script>
    // Bloquer toutes les requêtes vers sp.tinymce.com
    (function() {
      // Configuration globale
      window.tinymce_disable_telemetry = true;

      // Intercepter fetch
      const originalFetch = window.fetch;
      window.fetch = function(url, options) {
        if (typeof url === 'string' && url.includes('sp.tinymce.com')) {
          console.log('🚫 Blocked TinyMCE telemetry request:', url);
          return Promise.reject(new Error('Blocked telemetry request'));
        }
        return originalFetch.apply(this, arguments);
      };

      // Intercepter XMLHttpRequest
      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url) {
        if (typeof url === 'string' && url.includes('sp.tinymce.com')) {
          console.log('🚫 Blocked TinyMCE telemetry XHR:', url);
          // Créer une requête factice qui ne fait rien
          this.send = function() {};
          this.setRequestHeader = function() {};
          return;
        }
        return originalOpen.apply(this, arguments);
      };

      // Intercepter navigator.sendBeacon
      if (navigator.sendBeacon) {
        const originalSendBeacon = navigator.sendBeacon;
        navigator.sendBeacon = function(url, data) {
          if (typeof url === 'string' && url.includes('sp.tinymce.com')) {
            console.log('🚫 Blocked TinyMCE telemetry beacon:', url);
            return false;
          }
          return originalSendBeacon.call(this, url, data);
        };
      }

      // Intercepter Image requests (parfois utilisées pour la télémétrie)
      const originalImage = window.Image;
      window.Image = function() {
        const img = new originalImage();
        const originalSrc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');

        Object.defineProperty(img, 'src', {
          set: function(value) {
            if (typeof value === 'string' && value.includes('sp.tinymce.com')) {
              console.log('🚫 Blocked TinyMCE telemetry image:', value);
              return;
            }
            originalSrc.set.call(this, value);
          },
          get: function() {
            return originalSrc.get.call(this);
          }
        });

        return img;
      };
    })();
  </script>

  <script>
    (function (global) {
      console.log('🚀 Script de diagnostic mobile chargé');

      // Gestionnaire d'erreurs global
      window.startupErrors = window.startupErrors || [];

      window.onerror = function(message, source, lineno, colno, error) {
        // Ignorer les erreurs communes et non critiques
        var messageStr = message ? message.toString() : '';
        var ignoredErrors = ['WebView', 'Script error', 'Non-Error promise rejection', 'ResizeObserver loop limit exceeded'];

        if (ignoredErrors.some(function(ignored) { return messageStr.includes(ignored); })) {
          return true; // Ignorer silencieusement
        }

        // Limiter le nombre d'erreurs stockées
        if (window.startupErrors.length < 10) {
          var errorInfo = {
            message: messageStr.substring(0, 200), // Limiter la taille
            source: source ? source.split('/').pop() : 'unknown', // Juste le nom du fichier
            line: lineno,
            timestamp: new Date().toISOString()
          };

          window.startupErrors.push(errorInfo);
          console.error('❌ Erreur JavaScript:', errorInfo);
        }
        
        return false;
      };

      // Gestionnaire pour les promesses rejetées
      window.addEventListener('unhandledrejection', function(event) {
        var errorInfo = {
          type: 'Promise rejetée',
          reason: event.reason ? event.reason.toString() : 'Raison inconnue',
          timestamp: new Date().toISOString()
        };

        window.startupErrors.push(errorInfo);
        console.error('❌ Promise rejetée capturée:', errorInfo);
      });



      // Détecter si on est sur mobile
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      console.log('📱 Appareil mobile détecté:', isMobile);

      // Timeout de sécurité pour le loader - 8 SECONDES pour laisser plus de temps
      var securityTimeout = setTimeout(function() {
        var loader = document.getElementById("app-loading-holder");
        var appRoot = document.querySelector('app-root');
        var hasContent = appRoot && appRoot.children.length > 1;

        if (loader && !hasContent) {
          console.log('⚠️ TIMEOUT DE SÉCURITÉ - Loader encore présent après 8 secondes sans contenu');
          console.log('🔧 Suppression forcée du loader...');

          // Supprimer le loader immédiatement
          loader.style.opacity = "0";
          setTimeout(function() {
            if (loader && loader.parentNode) {
              loader.parentNode.removeChild(loader);
              console.log('✅ Loader supprimé par timeout de sécurité');
            }
          }, 200);
        } else if (loader && hasContent) {
          console.log('✅ Contenu détecté, suppression normale du loader');
          if (global.appBootstrap) {
            global.appBootstrap();
          }
        }
      }, 8000);

      // main.ts call this function once the app is boostrapped
      global.appBootstrap = function () {
        console.log('✅ appBootstrap() appelée - Application Angular démarrée');

        // Vérifier que le contenu est prêt avant de supprimer le loader
        var checkContentReady = function() {
          var appRoot = document.querySelector('app-root');
          var routerOutlet = document.querySelector('router-outlet');
          var hasContent = appRoot && (appRoot.children.length > 1 || 
            (routerOutlet && routerOutlet.nextElementSibling));
          
          if (hasContent) {
            // Annuler le timeout de sécurité
            if (securityTimeout) {
              clearTimeout(securityTimeout);
              console.log('🔧 Timeout de sécurité annulé');
            }

            var loader = document.getElementById("app-loading-holder");
            if (loader) {
              console.log('🔧 Suppression du loader - contenu prêt...');
              loader.style.opacity = "0";
              setTimeout(function() {
                if (loader && loader.parentNode) {
                  loader.parentNode.removeChild(loader);
                  console.log('✅ Loader supprimé avec succès');
                }
              }, 200);
            } else {
              console.log('⚠️ Loader déjà supprimé');
            }
          } else {
            console.log('⏳ Contenu pas encore prêt, nouvelle vérification dans 100ms');
            setTimeout(checkContentReady, 100);
          }
        };
        
        // Démarrer la vérification avec un petit délai
        setTimeout(checkContentReady, 100);
      };

      // Diagnostic périodique optimisé - surveillance du contenu
      var diagnosticCount = 0;
      var maxDiagnostics = 15; // Maximum 15 diagnostics (15 secondes)

      var diagnosticInterval = setInterval(function() {
        diagnosticCount++;
        var loader = document.getElementById("app-loading-holder");
        var appRoot = document.querySelector('app-root');
        var hasContent = appRoot && appRoot.children.length > 1;

        // Log des erreurs JavaScript seulement s'il y en a
        if (window.startupErrors && window.startupErrors.length > 0) {
          console.log('❌ Erreurs de démarrage:', window.startupErrors.length);
        }

        // Arrêter le diagnostic si l'app est chargée avec du contenu OU si on a atteint le maximum
        if (!loader || hasContent || diagnosticCount >= maxDiagnostics) {
          clearInterval(diagnosticInterval);
          if (hasContent) {
            console.log('✅ Diagnostic arrêté - contenu détecté');
          }
        }
      }, 1000);

    })(window);
  </script>
