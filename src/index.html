<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Ndewa360° | Gestion de location</title>
  <base href="/">

  <meta name="theme-color" content="#ffff00">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/img/logo/ndewa_miniaturise.svg" type="image/png">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js" integrity="sha512-b+nQTCdtTBIRIbraqNEwsjB6UvL3UEMkXnhzd8awtCYh0Kcsjl9uEgwVFVbhoj3uu1DO1ZMacNvLoyJJiNfcvg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://unpkg.com/flowbite@1.4.0/dist/flowbite.js"></script>

  <style type="text/css">
    body,
    html {
      height: 100%;
    }

    #app-loading-holder {  
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      bottom: 0;
      z-index: 11111;
      background: #f4f4f4;
    }

    .app-loading {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;

    }


    .logo {
      position: relative;
    }

    .logo img {
      width: 300px;
      height: auto;
    }

    .loader {
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      width: 330px;
      height: 45px;
      overflow: hidden;
    }
  </style>
  <script>
    (function (global) {
      // main.ts call this function once the app is boostrapped
      global.appBootstrap = function () {
        document.getElementById("app-loading-holder").remove();
      };
    })((window));
  </script>
</head>

<body class="mat-typography">
  <app-root>Loading...</app-root>
  <div id="app-loading-holder">
    <div class="app-loading">
      <div class="logo">
        <img src="assets/img/logo/logo-basic.png" />        
      </div>
    </div>
  </div>
</body>

</html>
